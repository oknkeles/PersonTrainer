<style>
  :root{
    --bg:#fbfbf9; --ink:#0e0e10; --ink-2:#5b5d66; --ink-3:#9a9ca6;
    --surface:#ffffff; --surface-2:#f4f4f1; --surface-3:#ececE8; --line:#e7e7e2; --hair:#eeeeea;
    --accent:#ff4d1c; --accent-ink:#e23b0c; --accent-soft:#ffe9e1;
    --ok:#0fa36b; --ok-bg:#e4f5ec; --wait:#c97a00; --wait-bg:#fbefd8; --stop:#e5484d; --stop-bg:#fbe5e6;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    --mono:"SF Mono",ui-monospace,"Menlo","Roboto Mono",monospace;
    --st:var(--safe-t,0px); --sb:var(--safe-b,0px);
    --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0a0a0b; --ink:#f4f4f2; --ink-2:#9ea0a8; --ink-3:#63656e;
      --surface:#141416; --surface-2:#1b1b1e; --surface-3:#232327; --line:#26262a; --hair:#1e1e21;
      --accent:#ff5a2c; --accent-ink:#ff7448; --accent-soft:#2a1710;
      --ok:#37d399; --ok-bg:#0e2e22; --wait:#e9a23b; --wait-bg:#2c2210; --stop:#ff6166; --stop-bg:#2e1518; }
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{ font-family:var(--sans); color:var(--ink); background:var(--bg); -webkit-font-smoothing:antialiased; overscroll-behavior-y:none; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  input,select{ font-family:inherit; }
  .mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
  #app{ max-width:520px; margin:0 auto; min-height:100%; display:flex; flex-direction:column; }
  svg{ display:block; }

  /* demo switcher */
  .demobar{ position:sticky; top:0; z-index:30; padding:calc(var(--safe-t) + 9px) 16px 9px;
    background:color-mix(in srgb,var(--bg) 88%,transparent); backdrop-filter:blur(16px); border-bottom:1px solid var(--hair); }
  .demolbl{ font-size:9px; font-weight:700; letter-spacing:.2em; color:var(--ink-3); text-transform:uppercase; margin:0 1px 8px; display:flex; justify-content:space-between; align-items:center; }
  .reset{ display:inline-flex; align-items:center; gap:4px; color:var(--accent); letter-spacing:0; font-weight:600; text-transform:none; font-size:11px; }
  .seg{ display:flex; gap:26px; }
  .seg button{ padding:2px 0 8px; font-size:14px; font-weight:600; color:var(--ink-3); position:relative; letter-spacing:-.01em; }
  .seg button.on{ color:var(--ink); }
  .seg button.on::after{ content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--accent); border-radius:2px; }

  .appbar{ padding:18px 18px 6px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .eyebrow{ font-size:10.5px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); margin-bottom:7px; }
  .h1{ font-size:27px; font-weight:800; letter-spacing:-.035em; line-height:1.03; }
  .subline{ font-size:13px; color:var(--ink-2); margin-top:5px; font-weight:500; }
  .avatar{ width:44px;height:44px;border-radius:13px; background:var(--ink); color:var(--bg); display:flex;align-items:center;justify-content:center; font-weight:700; font-size:14px; flex:none; letter-spacing:-.02em; }
  .iconbtn{ width:40px;height:40px;border-radius:11px; border:1px solid var(--line); background:var(--surface); color:var(--ink); display:flex;align-items:center;justify-content:center; flex:none; }
  .backbtn{ display:inline-flex; align-items:center; gap:6px; color:var(--ink); font-weight:600; font-size:14px; }

  .content{ flex:1; padding:6px 16px 118px; display:flex; flex-direction:column; gap:12px; }
  .sect{ font-size:10.5px; font-weight:700; letter-spacing:.15em; color:var(--ink-3); text-transform:uppercase; margin:10px 1px 1px; display:flex; align-items:center; justify-content:space-between; }

  .card{ background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:16px; }
  /* inverted hero — architectural */
  .hero{ background:var(--ink); color:var(--bg); border:none; border-radius:16px; padding:19px; }
  @media (prefers-color-scheme: light){ .hero{ box-shadow:0 20px 40px -24px rgba(14,14,16,.5); } }
  .hero .cap{ font-size:10.5px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; opacity:.55; display:flex; justify-content:space-between; }
  .hero .num{ font-size:52px; font-weight:700; line-height:.95; margin-top:12px; }
  .hero .num .accent{ color:var(--accent); } .hero .num small{ font-size:15px; font-weight:500; opacity:.6; letter-spacing:0; font-family:var(--sans); }
  .hline{ height:3px; border-radius:3px; background:rgba(255,255,255,.16); margin-top:16px; overflow:hidden; }
  @media (prefers-color-scheme: light){ .hline{ background:rgba(255,255,255,.22);} }
  .hline>span{ display:block; height:100%; background:var(--accent); }
  .hero .foot{ display:flex; justify-content:space-between; margin-top:12px; font-size:12px; opacity:.7; }

  .row{ display:flex; align-items:center; gap:13px; padding:13px 14px; background:var(--surface); border:1px solid var(--line); border-radius:14px; }
  .ic{ width:38px;height:38px;border-radius:11px; display:flex;align-items:center;justify-content:center; flex:none; background:var(--surface-2); color:var(--ink); }
  .ic svg{ width:19px;height:19px; } .ic.acc{ background:var(--accent-soft); color:var(--accent); } .ic.ok{ background:var(--ok-bg); color:var(--ok);} .ic.wait{ background:var(--wait-bg); color:var(--wait);} .ic.stop{ background:var(--stop-bg); color:var(--stop);}
  .mono-av{ width:38px;height:38px;border-radius:11px; background:var(--ink); color:var(--bg); display:flex;align-items:center;justify-content:center; font-weight:700; font-size:13px; flex:none; letter-spacing:-.02em; }
  .mono-av.wait{ background:var(--wait-bg); color:var(--wait);} .mono-av.stop{ background:var(--stop-bg); color:var(--stop);}
  .grow{ flex:1; min-width:0; }
  .t{ font-size:14.5px; font-weight:650; letter-spacing:-.01em; }
  .d{ font-size:12px; color:var(--ink-2); margin-top:3px; font-weight:500; }
  .tag{ font-size:10.5px; font-weight:700; padding:5px 9px; border-radius:7px; white-space:nowrap; letter-spacing:-.01em; text-transform:uppercase; }
  .tag.ok{ background:var(--ok-bg); color:var(--ok);} .tag.wait{ background:var(--wait-bg); color:var(--wait);} .tag.stop{ background:var(--stop-bg); color:var(--stop);} .tag.mut{ background:var(--surface-2); color:var(--ink-3);}

  .btn{ background:var(--accent); color:#fff; border-radius:13px; padding:15px; font-size:15px; font-weight:650; text-align:center; width:100%; letter-spacing:-.01em; display:flex; align-items:center; justify-content:center; gap:8px; }
  .btn:active{ background:var(--accent-ink); }
  .btn svg{ width:18px;height:18px; }
  .btn.ghost{ background:var(--surface); color:var(--ink); border:1px solid var(--line); }
  .btn.sm{ padding:11px; font-size:13px; border-radius:11px; }
  .btn[disabled]{ opacity:.4; pointer-events:none; }
  .btnrow{ display:flex; gap:9px; }
  .b-ok{ background:var(--ok); color:#fff; border-radius:11px; padding:12px; font-weight:650; font-size:13.5px; flex:1; display:flex; align-items:center; justify-content:center; gap:6px;}
  .b-ok svg{width:16px;height:16px;} .b-no svg{width:16px;height:16px;}
  .b-no{ background:var(--surface-2); color:var(--stop); border:1px solid var(--line); border-radius:11px; padding:12px; font-weight:650; font-size:13.5px; flex:1; display:flex; align-items:center; justify-content:center; gap:6px;}

  /* week / month navigator */
  .weeknav{ display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:7px; }
  .navbtn{ width:38px;height:38px;border-radius:9px; background:var(--surface-2); color:var(--ink); display:flex;align-items:center;justify-content:center; flex:none;}
  .navbtn[disabled]{ opacity:.3; pointer-events:none; }
  .wncenter{ flex:1; text-align:center; }
  .wnrange{ font-size:15px; font-weight:700; letter-spacing:-.02em; font-family:var(--mono); }
  .wnmonth{ font-size:10.5px; color:var(--ink-3); font-weight:600; text-transform:uppercase; letter-spacing:.12em; margin-top:2px; }

  .days{ display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-bottom:1px; }
  .days::-webkit-scrollbar{ display:none; }
  .day{ flex:0 0 auto; min-width:44px; text-align:center; padding:9px 4px; border-radius:11px; font-size:11px; font-weight:700; background:var(--surface); border:1px solid var(--line); color:var(--ink-2); text-transform:uppercase; letter-spacing:.03em; }
  .day.on{ background:var(--ink); color:var(--bg); border-color:var(--ink); }
  .day.off{ opacity:.4; } .day .n{ display:block; font-size:15px; margin-top:3px; font-family:var(--mono); letter-spacing:-.03em; }

  .slots{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .slot{ text-align:center; font-size:14px; font-weight:600; padding:13px 4px; border-radius:11px; border:1px solid var(--line); background:var(--surface); color:var(--ink); font-family:var(--mono); letter-spacing:-.02em; }
  .slot.free{ border-color:var(--ink); }
  .slot.sel{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .slot.busy{ color:var(--ink-3); background:var(--surface-2); border-style:dashed; text-decoration:line-through; }

  /* toggle segmented */
  .toggle{ display:flex; background:var(--surface-2); border:1px solid var(--line); border-radius:11px; padding:3px; }
  .toggle button{ flex:1; padding:9px; border-radius:8px; font-size:13px; font-weight:650; color:var(--ink-2); }
  .toggle button.on{ background:var(--surface); color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.12); }

  /* day agenda timeline */
  .tl{ display:flex; flex-direction:column; }
  .tlrow{ display:flex; gap:12px; align-items:stretch; padding-bottom:9px; }
  .tlrow .time{ width:46px; flex:none; font-size:12.5px; font-weight:600; color:var(--ink-3); padding-top:15px; font-family:var(--mono); text-align:right; }
  .slotcard{ flex:1; display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:13px; border:1px solid var(--line); background:var(--surface); position:relative; }
  .slotcard.empty{ border-style:dashed; background:transparent; color:var(--ink-3); font-size:12px; font-weight:600; justify-content:space-between; padding-left:15px; padding-right:13px; }
  .slotcard.empty.dragover{ border-style:solid; border-color:var(--accent); background:var(--accent-soft); color:var(--accent); }
  .slotcard.now{ border-color:var(--ink); }
  .grip{ width:26px; margin:-6px -6px -6px -4px; align-self:stretch; display:flex; align-items:center; justify-content:center; color:var(--ink-3); touch-action:none; cursor:grab; flex:none; }
  .grip svg{ width:16px;height:16px; }
  .slotcard.dragging{ opacity:.35; }
  .dragghost{ position:fixed; z-index:100; pointer-events:none; transform:translate(-50%,-150%);
    background:var(--ink); color:var(--bg); padding:9px 14px; border-radius:11px; font-size:13px; font-weight:700; box-shadow:0 16px 34px -10px rgba(0,0,0,.5); }
  .draghint{ display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--ink-3); font-weight:500; padding:2px 2px 4px; }
  .draghint svg{ width:15px;height:15px; }

  /* weekly grid */
  .wgrid{ display:grid; grid-template-columns:18px repeat(7,1fr); gap:4px; }
  .wgrid .h{ font-size:9px; font-weight:700; color:var(--ink-3); text-align:center; text-transform:uppercase; }
  .wgrid .tlab{ font-size:9px; font-weight:600; color:var(--ink-3); display:flex; align-items:center; justify-content:flex-end; padding-right:2px; font-family:var(--mono); }
  .cell{ height:32px; border-radius:7px; background:var(--surface-2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:8.5px; font-weight:800; color:var(--bg); letter-spacing:-.02em; }
  .cell.free{ background:transparent; border-style:dashed; } .cell.ok{ background:var(--ink); border-color:var(--ink); } .cell.wait{ background:var(--wait); border-color:var(--wait); color:#fff;}

  .stat2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stat{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:15px; }
  .stat .n{ font-size:30px; font-weight:700; font-family:var(--mono); letter-spacing:-.03em; line-height:1; }
  .stat .n .u{ font-size:13px; color:var(--ink-3); font-weight:500; }
  .stat .l{ font-size:11.5px; color:var(--ink-2); margin-top:6px; font-weight:600; }
  .stat .tr{ font-size:11px; font-weight:700; margin-top:6px; font-family:var(--mono);} .up{color:var(--ok);} .down{color:var(--stop);}

  /* aylık takvim */
  .mgrid{ display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
  .mgrid .mh{ font-size:9.5px; font-weight:700; color:var(--ink-3); text-align:center; text-transform:uppercase; letter-spacing:.04em; padding-bottom:2px; }
  .mcell{ aspect-ratio:1/1; border-radius:9px; border:1px solid var(--line); background:var(--surface); padding:5px 5px 4px; display:flex; flex-direction:column; align-items:flex-start; justify-content:space-between; }
  .mcell.out{ border:none; background:transparent; }
  .mcell.today{ border-color:var(--ink); border-width:1.5px; }
  .mcell .dnum{ font-size:11.5px; font-weight:700; font-family:var(--mono); color:var(--ink-2); }
  .mcell.today .dnum{ color:var(--ink); }
  .mcell .occ{ align-self:stretch; text-align:center; font-size:11px; font-weight:800; font-family:var(--mono); border-radius:5px; padding:1px 0; color:#fff; }

  .chart{ display:flex; align-items:flex-end; gap:9px; height:130px; padding:10px 2px 0; }
  .barcol{ flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; height:100%; justify-content:flex-end; }
  .barcol .stick{ width:100%; border-radius:5px 5px 0 0; background:var(--ink); }
  .barcol .stick.dim{ background:var(--surface-3); }
  .barcol .lab{ font-size:10px; font-weight:600; color:var(--ink-3);} .barcol .val{ font-size:10.5px; font-weight:700; font-family:var(--mono);}
  .lgrow{ display:flex; align-items:center; gap:11px; }
  .lgrow .sw{ width:8px;height:24px;border-radius:2px; flex:none; }
  .track{ height:6px; border-radius:3px; background:var(--surface-2); overflow:hidden; margin-top:6px; } .track>span{ display:block;height:100%;}
  .rowspace{ display:flex; justify-content:space-between; font-weight:650; font-size:13.5px; align-items:baseline; } .rowspace .mono{ color:var(--ink-2); font-size:13px; }

  /* forms */
  .field{ display:flex; flex-direction:column; gap:7px; margin-bottom:14px; }
  .field label{ font-size:11px; font-weight:700; color:var(--ink-2); text-transform:uppercase; letter-spacing:.08em; }
  .field input,.field select{ background:var(--surface-2); border:1px solid var(--line); border-radius:11px; padding:13px; font-size:16px; color:var(--ink); width:100%; -webkit-appearance:none; appearance:none; }
  .field .hint{ font-size:11px; color:var(--ink-3); font-weight:500; }
  .checks{ display:flex; gap:8px; }
  .chk{ flex:1; padding:12px 6px; border-radius:11px; border:1px solid var(--line); background:var(--surface-2); font-size:13px; font-weight:650; text-align:center; color:var(--ink-2); }
  .chk.on{ background:var(--ink); color:var(--bg); border-color:var(--ink); }
  .chips{ display:flex; gap:6px; flex-wrap:wrap; }
  .chip{ display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; padding:5px 10px; border-radius:8px; background:var(--surface-2); color:var(--ink-2); border:1px solid var(--line); }
  .chip svg{ width:13px;height:13px; }
  .quickrow{ display:flex; gap:7px; flex-wrap:wrap; }
  .quick{ padding:9px 14px; border-radius:9px; border:1px solid var(--line); background:var(--surface-2); font-size:13px; font-weight:700; color:var(--ink-2); font-family:var(--mono); }
  .quick.on{ background:var(--ink); color:var(--bg); border-color:var(--ink); }

  /* availability hour grid */
  .hourgrid{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .hourcell{ padding:12px 2px; border-radius:10px; border:1px solid var(--line); background:var(--surface-2); font-size:13px; font-weight:600; color:var(--ink-2); text-align:center; font-family:var(--mono); letter-spacing:-.02em; }
  .hourcell.on{ background:var(--accent); color:#fff; border-color:var(--accent); }

  /* arama kutusu */
  .searchbar{ display:flex; align-items:center; gap:9px; background:var(--surface-2); border:1px solid var(--line); border-radius:12px; padding:11px 13px; }
  .searchbar svg{ width:18px;height:18px; color:var(--ink-3); flex:none; }
  .searchbar input{ border:none; background:none; outline:none; font-size:16px; color:var(--ink); width:100%; }
  .addhint{ margin-left:auto; color:var(--accent); font-weight:700; font-size:11px; }

  /* alt sayfa (bottom sheet) */
  .sheet-bg{ position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.42); display:flex; align-items:flex-end; justify-content:center; animation:fade .2s ease; }
  .sheet{ width:100%; max-width:520px; background:var(--bg); border-radius:22px 22px 0 0; border-top:1px solid var(--line); max-height:84vh; display:flex; flex-direction:column; padding-bottom:calc(var(--safe-b) + 10px); animation:sheetup .26s cubic-bezier(.2,.8,.2,1); }
  @keyframes sheetup{ from{ transform:translateY(100%);} to{ transform:none; } }
  .sheet-h{ padding:16px 18px 12px; display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .sheet-h .h1{ font-size:20px; } .sheet-x{ width:34px;height:34px;border-radius:9px;background:var(--surface-2);display:flex;align-items:center;justify-content:center; flex:none; }
  .sheet .searchbar{ margin:0 16px 10px; }
  .sheet-list{ overflow-y:auto; padding:2px 16px 8px; display:flex; flex-direction:column; gap:8px; }
  .pickrow{ display:flex; align-items:center; gap:12px; padding:12px; border:1px solid var(--line); border-radius:13px; background:var(--surface); }
  .pickrow.dis{ opacity:.5; }

  .tabbar{ position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:520px; z-index:30;
    display:flex; justify-content:space-around; padding:8px 6px calc(var(--safe-b) + 10px);
    background:color-mix(in srgb,var(--bg) 90%,transparent); backdrop-filter:blur(18px); border-top:1px solid var(--hair); }
  .tb{ display:flex; flex-direction:column; align-items:center; gap:5px; font-size:10px; font-weight:600; color:var(--ink-3); padding:6px 12px 3px; position:relative; letter-spacing:.01em; }
  .tb svg{ width:22px;height:22px; }
  .tb.on{ color:var(--ink); }
  .tb.on::before{ content:""; position:absolute; top:0; width:20px; height:2.5px; border-radius:3px; background:var(--accent); }
  .tb .badge{ position:absolute; top:2px; right:6px; min-width:15px; height:15px; padding:0 4px; border-radius:8px; background:var(--accent); color:#fff; font-size:9px; font-weight:800; display:flex; align-items:center; justify-content:center; font-family:var(--mono); }

  .empty{ text-align:center; color:var(--ink-3); font-size:13px; padding:28px 10px; font-weight:500; }
  .toast{ position:fixed; bottom:calc(var(--safe-b) + 86px); left:50%; transform:translateX(-50%) translateY(16px); z-index:60;
    background:var(--ink); color:var(--bg); padding:12px 18px; border-radius:12px; font-size:13.5px; font-weight:650; opacity:0; transition:.28s; box-shadow:0 14px 34px -10px rgba(0,0,0,.5); max-width:90%; text-align:center;}
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .fadein{ animation:fade .3s ease; } @keyframes fade{ from{opacity:0; transform:translateY(5px);} to{opacity:1; transform:none;} }
  @media (prefers-reduced-motion: reduce){ *{ animation:none!important; transition:none!important; } }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
/* ---------- yardımcılar ---------- */
const DOW=['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
const MON=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
const MONF=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const pad=n=>String(n).padStart(2,'0');
const iso=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const addDays=(b,n)=>{ const d=new Date(b); d.setHours(12,0,0,0); d.setDate(d.getDate()+n); return d; };
const fmtDay=d=>`${DOW[d.getDay()]} ${d.getDate()} ${MON[d.getMonth()]}`;
const fmtShort=s=>{ const d=new Date(s); return `${d.getDate()} ${MON[d.getMonth()]}`; };
const hh=h=>pad(h)+':00';
const daysLeft=e=>Math.max(0,Math.round((new Date(e)-new Date())/864e5));
const $=id=>document.getElementById(id);
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2400); }

let S;
function load(){ try{ const r=localStorage.getItem(KEY); S=r?JSON.parse(r):seed(); if(S.v!==5) S=seed(); }catch(e){ S=seed(); } }
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(S)); }catch(e){} }
function resetDemo(){ if(confirm('Demo verileri sıfırlansın mı?')){ S=seed(); save(); render(); toast('Sıfırlandı'); } }
const me=()=>S.roster.find(r=>r.id===S.meId);
const member=id=>S.roster.find(r=>r.id===id);

/* ---------- iş mantığı ---------- */
function weekDatesFrom(off){ const m=new Date(S.mondayISO); m.setHours(12,0,0,0); const b=addDays(m,off*7); return Array.from({length:7},(_,i)=>addDays(b,i)); }
const trWeek=()=>weekDatesFrom(S.trWeek);
const bookWeek=()=>weekDatesFrom(S.bookWeek);
function availHours(tId,wd){ return ((S.availability[tId]||{})[wd]||[]).slice().sort((a,b)=>a-b); }
function activeReqs(tId,dISO){ return S.requests.filter(r=>r.trainerId===tId&&r.dateISO===dISO&&(r.status==='approved'||r.status==='pending')); }
function freeHours(tId,d){ const taken=activeReqs(tId,iso(d)).map(r=>r.hour); return availHours(tId,d.getDay()).filter(h=>!taken.includes(h)); }
function pendingFor(tId){ return S.requests.filter(r=>r.trainerId===tId&&r.status==='pending'); }
function studentsOf(tId){ return S.roster.filter(r=>r.trainers.includes(tId)); }
const pkgEnded=p=>p.used>=p.lessons||daysLeft(p.endISO)===0;

function book(){
  const sel=bookWeek()[S.bookDayOffset]; const t=trainer(S.bookTrainer); const p=me().pkg;
  if(p.used>=p.lessons){ toast('Kotan dolu — talep açılamıyor'); return; }
  if(S.bookHour==null) return;
  S.requests.push({id:'r'+Date.now(),trainerId:S.bookTrainer,studentId:S.meId,studentName:me().name,initials:me().initials,dateISO:iso(sel),hour:S.bookHour,status:'pending'});
  S.notifs.unshift({icon:'clock',t:'Talebin alındı',d:`${t.name} · ${DOW[sel.getDay()]} ${hh(S.bookHour)}`,when:'şimdi'});
  S.bookHour=null; save(); S.screen.student='home'; render(); toast('Talep gönderildi · dilim kilitlendi');
}
function approve(id){ const r=S.requests.find(x=>x.id===id); if(!r)return; r.status='approved'; const s=member(r.studentId);
  s.pkg.used=Math.min(s.pkg.lessons,s.pkg.used+1);
  if(s.id===S.meId){ S.log.unshift({dateISO:r.dateISO,trainer:firstName(r.trainerId)+' H.',kind:'done',delta:-1});
    S.notifs.unshift({icon:'check',t:'Dersin onaylandı',d:`${trainer(r.trainerId).name} · ${hh(r.hour)}`,when:'şimdi'}); }
  save(); render(); toast('Onaylandı · kotadan düşüldü'); }
function reject(id){ const r=S.requests.find(x=>x.id===id); if(!r)return; r.status='rejected';
  if(r.studentId===S.meId) S.notifs.unshift({icon:'x',t:'Talebin reddedildi',d:`${trainer(r.trainerId).name} · dilim tekrar açıldı`,when:'şimdi'});
  save(); render(); toast('Reddedildi · dilim açıldı'); }
function moveLesson(rid,newHour){ const r=S.requests.find(x=>x.id===rid); if(!r||r.hour===newHour) return;
  const old=r.hour; r.hour=newHour;
  const s=member(r.studentId);
  S.notifs.unshift({icon:'refresh',t:'Ders saati değişti',d:`${firstName(r.trainerId)} Hoca · ${hh(old)} → ${hh(newHour)}`,when:'şimdi'});
  save(); render(); toast(`${s.name}: ${hh(old)} → ${hh(newHour)} · öğrenciye bildirildi`); }
function extendMonths(id,m){ const p=member(id).pkg; p.endISO=iso(addDays(new Date(p.endISO),m*30)); p.months+=m; save(); render(); toast(`${member(id).name.split(' ')[0]} · süre +${m} ay uzatıldı`); }
function addLessons(id,n){ member(id).pkg.lessons+=n; save(); render(); toast(`${member(id).name.split(' ')[0]} · +${n} ders`); }
function avToggle(hr){ const wd=S.availDay; const a=(S.availability.t1[wd]=S.availability.t1[wd]||[]); const i=a.indexOf(hr); if(i>=0)a.splice(i,1); else a.push(hr); save(); render(); }

function defToggleTrainer(id){ const a=S.def.trainers; const i=a.indexOf(id); if(i>=0){ if(a.length>1)a.splice(i,1);} else a.push(id); save(); render(); }
function defPickMember(id){ const m=member(id); S.def={memberId:id,trainers:[...m.trainers],lessons:m.pkg.lessons,months:m.pkg.months}; save(); render(); }
function defQuick(n){ S.def.lessons=n; save(); render(); }
function defineSubmit(){ const m=member(S.def.memberId); const now=new Date(); now.setHours(12,0,0,0);
  const lessons=Math.max(1,parseInt(S.def.lessons)||1), months=Math.max(1,parseInt(S.def.months)||1);
  m.trainers=[...S.def.trainers]; m.pkg={lessons,months,used:0,startISO:iso(now),endISO:iso(addDays(now,months*30))};
  save(); render(); toast(`${m.name.split(' ')[0]} · ${lessons} ders / ${months} ay tanımlandı`); }

/* yönetici arama */
function filterMembers(v){ S.memberSearch=v; save(); const el=document.getElementById('memberList'); if(el) el.innerHTML=memberListHTML(); }
function memberListHTML(){ const q=(S.memberSearch||'').toLocaleLowerCase('tr');
  const list=S.roster.filter(s=>s.name.toLocaleLowerCase('tr').includes(q));
  if(!list.length) return `<div class="empty">Eşleşen üye yok</div>`;
  return list.map(memberCard).join(''); }
function memberCard(s){ const p=s.pkg; const e=pkgEnded(p); const trs=s.trainers.map(id=>trainer(id).name.split(' ')[0]).join(', ');
  return `<div class="row" style="cursor:pointer" onclick="openMember('${s.id}')"><div class="mono-av ${e?'stop':''}">${s.initials}</div>
    <div class="grow"><div class="t">${s.name}</div><div class="d mono">${p.used}/${p.lessons} ders · ${e?'kapandı':daysLeft(p.endISO)+' gün'} · ${trs}</div></div>
    <span class="tag ${e?'stop':'ok'}">${e?'Bitti':'Aktif'}</span><span style="color:var(--ink-3);display:flex">${ic('chevronR',18)}</span></div>`; }
function openMember(id){ S.adminMember=id; const m=member(id); S.def={memberId:id,trainers:[...m.trainers],lessons:m.pkg.lessons,months:m.pkg.months}; save(); render(); }
function closeMember(){ S.adminMember=null; save(); render(); }

/* hoca: boş saate öğrenci ekleme */
function openAdd(h){ if(Date.now()-(window._dragJust||0)<400) return; S.addSlot={hour:h}; S.addSearch=''; save(); render(); }
function closeAdd(){ S.addSlot=null; save(); render(); }
function filterAdd(v){ S.addSearch=v; const el=document.getElementById('addList'); if(el) el.innerHTML=addListHTML(); }
function addStudentToSlot(id){ const sel=trWeek()[S.dayOffset]; const s=member(id);
  if(s.pkg.used>=s.pkg.lessons){ toast(s.name.split(' ')[0]+' · kotası dolu'); return; }
  const hr=S.addSlot.hour;
  S.requests.push({id:'r'+Date.now(),trainerId:'t1',studentId:id,studentName:s.name,initials:s.initials,dateISO:iso(sel),hour:hr,status:'approved'});
  s.pkg.used++;
  if(id===S.meId) S.log.unshift({dateISO:iso(sel),trainer:'Ahmet H.',kind:'done',delta:-1});
  S.notifs.unshift({icon:'calendar',t:'Derse eklendin',d:`Ahmet Hoca · ${DOW[sel.getDay()]} ${hh(hr)}`,when:'şimdi'});
  S.addSlot=null; save(); render(); toast(`${s.name.split(' ')[0]} · ${hh(hr)} eklendi · kotadan düşüldü`); }
function addListHTML(){ const q=(S.addSearch||'').toLocaleLowerCase('tr');
  const list=studentsOf('t1').filter(s=>s.name.toLocaleLowerCase('tr').includes(q));
  if(!list.length) return `<div class="empty">Eşleşen öğrenci yok</div>`;
  return list.map(s=>{ const rem=s.pkg.lessons-s.pkg.used, full=rem<=0;
    return `<div class="pickrow ${full?'dis':''}" ${full?'':`onclick="addStudentToSlot('${s.id}')"`}><div class="mono-av ${full?'stop':''}">${s.initials}</div><div class="grow"><div class="t">${s.name}</div><div class="d mono">${rem}/${s.pkg.lessons} ders kaldı</div></div>${full?'<span class="tag stop">Dolu</span>':`<span class="tag ok">Ekle</span>`}</div>`; }).join(''); }
function addSheet(){ if(!S.addSlot) return ''; const sel=trWeek()[S.dayOffset];
  return `<div class="sheet-bg" onclick="if(event.target===this)closeAdd()"><div class="sheet">
    <div class="sheet-h"><div><div class="eyebrow">${DOW[sel.getDay()]} ${sel.getDate()} ${MON[sel.getMonth()]} · ${hh(S.addSlot.hour)}</div><div class="h1">Boş saate öğrenci ekle</div></div><button class="sheet-x" onclick="closeAdd()">${ic('x',18)}</button></div>
    <div class="searchbar">${ic('search',18)}<input placeholder="Öğrenci ara…" oninput="filterAdd(this.value)"></div>
    <div class="sheet-list" id="addList">${addListHTML()}</div></div></div>`; }

/* nav */
function setRole(r){ S.role=r; save(); render(); }
function go(s){ S.screen[S.role]=s; S.adminMember=null; save(); render(); }
function trWeekShift(d){ S.trWeek+=d; save(); render(); }
function bookWeekShift(d){ S.bookWeek=Math.max(0,S.bookWeek+d); S.bookHour=null; save(); render(); }
function repMonthShift(d){ S.repMonth=Math.min(0,S.repMonth+d); save(); render(); }
function setAgenda(v){ S.agendaView=v; save(); render(); }
function setDay(i){ S.dayOffset=i; if(S.agendaView==='month') S.agendaView='day'; save(); render(); }
function avWeekShift(d){ S.avWeek+=d; save(); render(); }
function setAvailDay(d){ S.availDay=d; save(); render(); }
function setBookTrainer(id){ S.bookTrainer=id; S.bookHour=null; save(); render(); }
function setBookDay(i){ S.bookDayOffset=i; S.bookHour=null; save(); render(); }
function setBookHour(h){ S.bookHour=h; save(); render(); }

/* ---------- render ---------- */
function weekNav(dates,prevFn,nextFn,prevOff){
  const a=dates[0],b=dates[6];
  const range=a.getMonth()===b.getMonth()?`${a.getDate()}–${b.getDate()} ${MON[b.getMonth()]}`:`${a.getDate()} ${MON[a.getMonth()]} – ${b.getDate()} ${MON[b.getMonth()]}`;
  return `<div class="weeknav"><button class="navbtn" ${prevOff?'disabled':''} onclick="${prevFn}">${ic('chevronL',20)}</button>
    <div class="wncenter"><div class="wnrange">${range}</div><div class="wnmonth">${MONF[a.getMonth()]} ${a.getFullYear()}</div></div>
    <button class="navbtn" onclick="${nextFn}">${ic('chevronR',20)}</button></div>`;
}
function render(){
  const titles={student:'Öğrenci',trainer:'Hoca',admin:'Salon Sahibi'};
  let h=`<div class="demobar"><div class="demolbl"><span>Demo · rol seç</span><button class="reset" onclick="resetDemo()">${ic('refresh',13)} Sıfırla</button></div>
    <div class="seg">${['student','trainer','admin'].map(r=>`<button class="${S.role===r?'on':''}" onclick="setRole('${r}')">${titles[r]}</button>`).join('')}</div></div>`;
  h+=`<div class="content fadein">`+(S.role==='student'?renderStudent():S.role==='trainer'?renderTrainer():renderAdmin())+`</div>`;
  h+=renderTabs();
  h+=addSheet();
  $('app').innerHTML=h;
}

function renderStudent(){
  const sc=S.screen.student, p=me().pkg;
  if(sc==='book') return renderBook();
  if(sc==='package'){
    return `<div class="appbar"><div><button class="backbtn" onclick="go('home')">${ic('chevronL',18)} Paket</button><div class="h1" style="margin-top:8px">${p.lessons} Ders · ${p.months} Ay</div><div class="subline mono">${fmtShort(p.startISO)} – ${fmtShort(p.endISO)}</div></div></div>
    <div class="stat2"><div class="stat"><div class="n" style="color:var(--accent)">${p.lessons-p.used}</div><div class="l">Kalan hak</div></div>
      <div class="stat"><div class="n">${daysLeft(p.endISO)}<span class="u"> gün</span></div><div class="l">Süre kaldı</div></div></div>
    <div class="sect">Kullanım dökümü</div>

/* ---------- sürükle-bırak (pointer, mobil uyumlu) ---------- */
let drag=null;
function ghostMove(e){ if(drag&&drag.g){ drag.g.style.left=e.clientX+'px'; drag.g.style.top=e.clientY+'px'; } }
document.addEventListener('pointerdown',e=>{ const grip=e.target.closest&&e.target.closest('.grip'); if(!grip)return;
  const card=grip.closest('[data-reqid]'); if(!card)return; e.preventDefault();
  const rid=card.dataset.reqid; const r=S.requests.find(x=>x.id===rid); if(!r)return;
  const g=document.createElement('div'); g.className='dragghost'; g.textContent=r.studentName+' · yeni saat'; document.body.appendChild(g);
  drag={rid,g,target:null}; ghostMove(e); card.classList.add('dragging');
},{passive:false});
document.addEventListener('pointermove',e=>{ if(!drag)return; e.preventDefault(); ghostMove(e);
  const el=document.elementFromPoint(e.clientX,e.clientY); const slot=el&&el.closest&&el.closest('[data-drop]');
  document.querySelectorAll('.dragover').forEach(x=>x.classList.remove('dragover'));
  if(slot){ slot.classList.add('dragover'); drag.target=slot.dataset.hour; } else drag.target=null;
},{passive:false});
document.addEventListener('pointerup',()=>{ if(!drag)return; const t=drag.target,rid=drag.rid; drag.g.remove();
  document.querySelectorAll('.dragover').forEach(x=>x.classList.remove('dragover')); drag=null;
  if(t!=null){ window._dragJust=Date.now(); moveLesson(rid,+t); } },{passive:false});

load(); render();
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
