<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Studio">
<meta name="theme-color" content="#0a0a0b">
<title>Antrenman Studio</title>
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiQW50cmVubWFuIFN0dWRpbyIsInNob3J0X25hbWUiOiJTdHVkaW8iLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzBhMGEwYiIsInRoZW1lX2NvbG9yIjoiIzBhMGEwYiJ9">
<style>
  :root{
    --bg:#fbfbf9; --ink:#0e0e10; --ink-2:#5b5d66; --ink-3:#9a9ca6;
    --surface:#ffffff; --surface-2:#f4f4f1; --surface-3:#ececE8; --line:#e7e7e2; --hair:#eeeeea;
    --accent:#ff4d1c; --accent-ink:#e23b0c; --accent-soft:#ffe9e1;
    --ok:#0fa36b; --ok-bg:#e4f5ec; --wait:#c97a00; --wait-bg:#fbefd8; --stop:#e5484d; --stop-bg:#fbe5e6;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    --mono:"SF Mono",ui-monospace,"Menlo","Roboto Mono",monospace;
    --st:var(--safe-t,0px); --sb:var(--safe-b,0px);
    --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0a0a0b; --ink:#f4f4f2; --ink-2:#9ea0a8; --ink-3:#63656e;
      --surface:#141416; --surface-2:#1b1b1e; --surface-3:#232327; --line:#26262a; --hair:#1e1e21;
      --accent:#ff5a2c; --accent-ink:#ff7448; --accent-soft:#2a1710;
      --ok:#37d399; --ok-bg:#0e2e22; --wait:#e9a23b; --wait-bg:#2c2210; --stop:#ff6166; --stop-bg:#2e1518; }
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{ font-family:var(--sans); color:var(--ink); background:var(--bg); -webkit-font-smoothing:antialiased; overscroll-behavior-y:none; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  input,select{ font-family:inherit; }
  .mono{ font-family:var(--mono); font-variant-numeric:tabular-nums; letter-spacing:-.02em; }
  #app{ max-width:520px; margin:0 auto; min-height:100%; display:flex; flex-direction:column; }
  svg{ display:block; }

  /* demo switcher */
  .demobar{ position:sticky; top:0; z-index:30; padding:calc(var(--safe-t) + 9px) 16px 9px;
    background:color-mix(in srgb,var(--bg) 88%,transparent); backdrop-filter:blur(16px); border-bottom:1px solid var(--hair); }
  .demolbl{ font-size:9px; font-weight:700; letter-spacing:.2em; color:var(--ink-3); text-transform:uppercase; margin:0 1px 8px; display:flex; justify-content:space-between; align-items:center; }
  .reset{ display:inline-flex; align-items:center; gap:4px; color:var(--accent); letter-spacing:0; font-weight:600; text-transform:none; font-size:11px; }
  .seg{ display:flex; gap:26px; }
  .seg button{ padding:2px 0 8px; font-size:14px; font-weight:600; color:var(--ink-3); position:relative; letter-spacing:-.01em; }
  .seg button.on{ color:var(--ink); }
  .seg button.on::after{ content:""; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--accent); border-radius:2px; }

  .appbar{ padding:18px 18px 6px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
  .eyebrow{ font-size:10.5px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); margin-bottom:7px; }
  .h1{ font-size:27px; font-weight:800; letter-spacing:-.035em; line-height:1.03; }
  .subline{ font-size:13px; color:var(--ink-2); margin-top:5px; font-weight:500; }
  .avatar{ width:44px;height:44px;border-radius:13px; background:var(--ink); color:var(--bg); display:flex;align-items:center;justify-content:center; font-weight:700; font-size:14px; flex:none; letter-spacing:-.02em; }
  .iconbtn{ width:40px;height:40px;border-radius:11px; border:1px solid var(--line); background:var(--surface); color:var(--ink); display:flex;align-items:center;justify-content:center; flex:none; }
  .backbtn{ display:inline-flex; align-items:center; gap:6px; color:var(--ink); font-weight:600; font-size:14px; }

  .content{ flex:1; padding:6px 16px 118px; display:flex; flex-direction:column; gap:12px; }
  .sect{ font-size:10.5px; font-weight:700; letter-spacing:.15em; color:var(--ink-3); text-transform:uppercase; margin:10px 1px 1px; display:flex; align-items:center; justify-content:space-between; }

  /* giriş / şifre ekranları */
  #app.auth{ justify-content:center; }
  .authwrap{ padding:calc(var(--safe-t) + 28px) 22px calc(var(--safe-b) + 28px); display:flex; flex-direction:column; justify-content:center; min-height:100vh; gap:22px; }
  .authbrand{ text-align:center; }
  .authbrand .mark{ width:56px; height:56px; border-radius:18px; background:var(--ink); color:var(--bg); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:18px; margin:0 auto 14px; letter-spacing:-.03em; }
  .authbrand .nm{ font-size:20px; font-weight:800; letter-spacing:-.03em; }
  .authbrand .sb{ font-size:12.5px; color:var(--ink-3); margin-top:4px; font-weight:500; }
  .authcard{ background:var(--surface); border:1px solid var(--hair); border-radius:22px; padding:22px; }
  @media (prefers-color-scheme: light){ .authcard{ box-shadow:0 2px 4px rgba(16,17,22,.04), 0 24px 50px -30px rgba(16,17,22,.3); } }
  .authcard h2{ font-size:22px; font-weight:800; letter-spacing:-.03em; margin:0 0 3px; }
  .authcard .lead{ font-size:13px; color:var(--ink-2); margin:0 0 18px; font-weight:500; line-height:1.5; }
  .autherr{ background:var(--stop-bg); color:var(--stop); border-radius:11px; padding:11px 13px; font-size:12.5px; font-weight:650; margin-bottom:13px; display:flex; align-items:center; gap:8px; }
  .autherr svg{ width:16px; height:16px; flex:none; }
  .demohint{ border:1px dashed var(--line); border-radius:14px; padding:13px; }
  .demohint .dh{ font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); margin-bottom:9px; }
  .demorow{ display:flex; justify-content:space-between; align-items:center; gap:10px; padding:7px 0; font-size:12.5px; }
  .demorow .who{ color:var(--ink-2); font-weight:600; }
  .demorow .num{ font-family:var(--mono); font-weight:700; color:var(--ink); }
  .demorow button{ font-size:11px; font-weight:700; color:var(--accent); background:var(--accent-soft); padding:5px 9px; border-radius:7px; }

  /* uygulama üst barı */
  .topbar{ position:sticky; top:0; z-index:30; padding:calc(var(--safe-t) + 10px) 16px 11px; display:flex; align-items:center; gap:11px;
    background:color-mix(in srgb,var(--bg) 88%,transparent); backdrop-filter:blur(16px); border-bottom:1px solid var(--hair); }
  .tb-av{ width:38px; height:38px; border-radius:13px; background:var(--ink); color:var(--bg); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex:none; letter-spacing:-.02em; }
  .tb-name{ font-size:14px; font-weight:700; letter-spacing:-.01em; line-height:1.2; }
  .tb-role{ font-size:11px; color:var(--ink-3); font-weight:600; margin-top:2px; }
  .tb-out{ width:38px; height:38px; border-radius:11px; background:var(--surface-2); border:1px solid var(--hair); color:var(--ink-2); display:flex; align-items:center; justify-content:center; flex:none; }
  .tb-out svg{ width:18px; height:18px; }
  .ownerseg{ display:flex; background:var(--surface-2); border:1px solid var(--hair); border-radius:11px; padding:3px; margin-left:auto; }
  .ownerseg button{ padding:7px 12px; border-radius:8px; font-size:12px; font-weight:700; color:var(--ink-2); transition:.16s ease; }
  .ownerseg button.on{ background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.06); }

  /* müsaitlik: kompakt mod + saat havuzu */
  .modebar{ display:flex; align-items:center; gap:7px; flex-wrap:wrap; padding:2px 1px; }
  .modelbl{ font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); }
  .mchip{ padding:8px 13px; border-radius:10px; font-size:12.5px; font-weight:650; color:var(--ink-2); background:var(--surface-2); border:1px solid var(--hair); transition:.16s ease; }
  .mchip.on{ background:var(--ink); color:var(--bg); border-color:var(--ink); }
  .mchip.rev{ padding:8px 10px; display:inline-flex; color:var(--accent); }
  .availhead{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin:10px 1px 0; }
  .availsum{ font-size:12.5px; font-weight:650; color:var(--accent); text-align:right; }
  .rateinp{ display:flex; align-items:center; gap:5px; flex:none; }
  .rateinp input{ width:62px; text-align:right; padding:9px 8px; border-radius:10px; border:1px solid var(--hair); background:var(--surface-2); font-family:var(--mono); font-size:14.5px; font-weight:700; color:var(--ink); -webkit-appearance:none; appearance:none; }
  .rateinp span{ font-size:13px; font-weight:700; color:var(--ink-3); }

  .card{ background:var(--surface); border:1px solid var(--hair); border-radius:18px; padding:16px; }
  /* inverted hero — architectural */
  .hero{ background:var(--ink); color:var(--bg); border:none; border-radius:16px; padding:19px; }
  @media (prefers-color-scheme: light){ .hero{ box-shadow:0 20px 40px -24px rgba(14,14,16,.5); } }
  .hero .cap{ font-size:10.5px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; opacity:.55; display:flex; justify-content:space-between; }
  .hero .num{ font-size:52px; font-weight:700; line-height:.95; margin-top:12px; }
  .hero .num .accent{ color:var(--accent); } .hero .num small{ font-size:15px; font-weight:500; opacity:.6; letter-spacing:0; font-family:var(--sans); }
  .hline{ height:3px; border-radius:3px; background:rgba(255,255,255,.16); margin-top:16px; overflow:hidden; }
  @media (prefers-color-scheme: light){ .hline{ background:rgba(255,255,255,.22);} }
  .hline>span{ display:block; height:100%; background:var(--accent); }
  .hero .foot{ display:flex; justify-content:space-between; margin-top:12px; font-size:12px; opacity:.7; }

  .row{ display:flex; align-items:center; gap:13px; padding:14px; background:var(--surface); border:1px solid var(--hair); border-radius:16px; transition:.16s ease; }
  .row[onclick]:active{ transform:scale(.994); background:var(--surface-2); }
  .ic{ width:38px;height:38px;border-radius:11px; display:flex;align-items:center;justify-content:center; flex:none; background:var(--surface-2); color:var(--ink); }
  .ic svg{ width:19px;height:19px; } .ic.acc{ background:var(--accent-soft); color:var(--accent); } .ic.ok{ background:var(--ok-bg); color:var(--ok);} .ic.wait{ background:var(--wait-bg); color:var(--wait);} .ic.stop{ background:var(--stop-bg); color:var(--stop);}
  .mono-av{ width:38px;height:38px;border-radius:11px; background:var(--ink); color:var(--bg); display:flex;align-items:center;justify-content:center; font-weight:700; font-size:13px; flex:none; letter-spacing:-.02em; }
  .mono-av.wait{ background:var(--wait-bg); color:var(--wait);} .mono-av.stop{ background:var(--stop-bg); color:var(--stop);}
  .grow{ flex:1; min-width:0; }
  .t{ font-size:14.5px; font-weight:650; letter-spacing:-.01em; }
  .d{ font-size:12px; color:var(--ink-2); margin-top:3px; font-weight:500; }
  .tag{ font-size:10.5px; font-weight:700; padding:5px 9px; border-radius:7px; white-space:nowrap; letter-spacing:-.01em; text-transform:uppercase; }
  .tag.ok{ background:var(--ok-bg); color:var(--ok);} .tag.wait{ background:var(--wait-bg); color:var(--wait);} .tag.stop{ background:var(--stop-bg); color:var(--stop);} .tag.mut{ background:var(--surface-2); color:var(--ink-3);}

  .btn{ background:var(--accent); color:#fff; border-radius:15px; padding:16px; font-size:15px; font-weight:650; text-align:center; width:100%; letter-spacing:-.01em; display:flex; align-items:center; justify-content:center; gap:8px; transition:.16s ease; box-shadow:0 10px 22px -14px color-mix(in srgb,var(--accent) 80%,transparent); }
  .btn:active{ background:var(--accent-ink); transform:scale(.985); }
  .btn svg{ width:18px;height:18px; }
  .btn.ghost{ background:var(--surface); color:var(--ink); border:1px solid var(--line); }
  .btn.sm{ padding:11px; font-size:13px; border-radius:11px; }
  .btn[disabled]{ opacity:.4; pointer-events:none; }
  .btnrow{ display:flex; gap:9px; }
  .b-ok{ background:var(--ok); color:#fff; border-radius:11px; padding:12px; font-weight:650; font-size:13.5px; flex:1; display:flex; align-items:center; justify-content:center; gap:6px;}
  .b-ok svg{width:16px;height:16px;} .b-no svg{width:16px;height:16px;}
  .b-no{ background:var(--surface-2); color:var(--stop); border:1px solid var(--line); border-radius:11px; padding:12px; font-weight:650; font-size:13.5px; flex:1; display:flex; align-items:center; justify-content:center; gap:6px;}

  /* week / month navigator */
  .weeknav{ display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:7px; }
  .navbtn{ width:38px;height:38px;border-radius:9px; background:var(--surface-2); color:var(--ink); display:flex;align-items:center;justify-content:center; flex:none;}
  .navbtn[disabled]{ opacity:.3; pointer-events:none; }
  .wncenter{ flex:1; text-align:center; }
  .wnrange{ font-size:15px; font-weight:700; letter-spacing:-.02em; font-family:var(--mono); }
  .wnmonth{ font-size:10.5px; color:var(--ink-3); font-weight:600; text-transform:uppercase; letter-spacing:.12em; margin-top:2px; }

  .days{ display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-bottom:1px; }
  .days::-webkit-scrollbar{ display:none; }
  .day{ flex:0 0 auto; min-width:46px; text-align:center; padding:10px 5px; border-radius:13px; font-size:11px; font-weight:700; background:var(--surface); border:1px solid var(--hair); color:var(--ink-2); text-transform:uppercase; letter-spacing:.03em; transition:.16s ease; }
  .day:active{ transform:scale(.96); }
  .day.on{ background:var(--ink); color:var(--bg); border-color:var(--ink); }
  .day.off{ opacity:.4; } .day .n{ display:block; font-size:15px; margin-top:3px; font-family:var(--mono); letter-spacing:-.03em; }
  .day{ position:relative; } .ovdot{ position:absolute; top:5px; right:6px; width:5px; height:5px; border-radius:50%; background:var(--accent); }

  .slots{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .slot{ text-align:center; font-size:14px; font-weight:600; padding:14px 4px; border-radius:13px; border:1px solid var(--hair); background:var(--surface); color:var(--ink); font-family:var(--mono); letter-spacing:-.02em; transition:.16s ease; }
  .slot:active{ transform:scale(.96); }
  .slot.free{ border-color:var(--ink); }
  .slot.sel{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .slot.busy{ color:var(--ink-3); background:var(--surface-2); border-style:dashed; text-decoration:line-through; }

  /* toggle segmented */
  .toggle{ display:flex; background:var(--surface-2); border:1px solid var(--hair); border-radius:13px; padding:4px; }
  .toggle button{ flex:1; padding:10px; border-radius:10px; font-size:13px; font-weight:650; color:var(--ink-2); transition:.18s ease; }
  .toggle button.on{ background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.06), 0 6px 14px -10px rgba(0,0,0,.35); }

  /* day agenda timeline */
  .tl{ display:flex; flex-direction:column; }
  .tlrow{ display:flex; gap:12px; align-items:stretch; padding-bottom:9px; }
  .tlrow .time{ width:46px; flex:none; font-size:12.5px; font-weight:600; color:var(--ink-3); padding-top:15px; font-family:var(--mono); text-align:right; }
  .slotcard{ flex:1; display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:13px; border:1px solid var(--line); background:var(--surface); position:relative; }
  .slotcard.empty{ border-style:dashed; background:transparent; color:var(--ink-3); font-size:12px; font-weight:600; justify-content:space-between; padding-left:15px; padding-right:13px; }
  .slotcard.empty.dragover{ border-style:solid; border-color:var(--accent); background:var(--accent-soft); color:var(--accent); }
  .slotcard.now{ border-color:var(--ink); }
  .grip{ width:26px; margin:-6px -6px -6px -4px; align-self:stretch; display:flex; align-items:center; justify-content:center; color:var(--ink-3); touch-action:none; cursor:grab; flex:none; }
  .grip svg{ width:16px;height:16px; }
  .slotcard.dragging{ opacity:.35; }
  .dragghost{ position:fixed; z-index:100; pointer-events:none; transform:translate(-50%,-150%);
    background:var(--ink); color:var(--bg); padding:9px 14px; border-radius:11px; font-size:13px; font-weight:700; box-shadow:0 16px 34px -10px rgba(0,0,0,.5); }
  .draghint{ display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--ink-3); font-weight:500; padding:2px 2px 4px; }
  .draghint svg{ width:15px;height:15px; }

  /* weekly grid */
  .wgrid{ display:grid; grid-template-columns:18px repeat(7,1fr); gap:4px; }
  .wgrid .h{ font-size:9px; font-weight:700; color:var(--ink-3); text-align:center; text-transform:uppercase; }
  .wgrid .tlab{ font-size:9px; font-weight:600; color:var(--ink-3); display:flex; align-items:center; justify-content:flex-end; padding-right:2px; font-family:var(--mono); }
  .cell{ height:32px; border-radius:7px; background:var(--surface-2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:8.5px; font-weight:800; color:var(--bg); letter-spacing:-.02em; }
  .cell.free{ background:transparent; border-style:dashed; } .cell.ok{ background:var(--ink); border-color:var(--ink); } .cell.wait{ background:var(--wait); border-color:var(--wait); color:#fff;}

  .stat2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stat{ background:var(--surface); border:1px solid var(--hair); border-radius:17px; padding:16px; }
  .stat .n{ font-size:30px; font-weight:700; font-family:var(--mono); letter-spacing:-.03em; line-height:1; }
  .stat .n .u{ font-size:13px; color:var(--ink-3); font-weight:500; }
  .stat .l{ font-size:11.5px; color:var(--ink-2); margin-top:6px; font-weight:600; }
  .stat .tr{ font-size:11px; font-weight:700; margin-top:6px; font-family:var(--mono);} .up{color:var(--ok);} .down{color:var(--stop);}

  /* aylık takvim */
  .mgrid{ display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
  .mgrid .mh{ font-size:9.5px; font-weight:700; color:var(--ink-3); text-align:center; text-transform:uppercase; letter-spacing:.04em; padding-bottom:2px; }
  .mcell{ aspect-ratio:1/1; border-radius:9px; border:1px solid var(--line); background:var(--surface); padding:5px 5px 4px; display:flex; flex-direction:column; align-items:flex-start; justify-content:space-between; }
  .mcell.out{ border:none; background:transparent; }
  .mcell.today{ border-color:var(--ink); border-width:1.5px; }
  .mcell .dnum{ font-size:11.5px; font-weight:700; font-family:var(--mono); color:var(--ink-2); }
  .mcell.today .dnum{ color:var(--ink); }
  .mcell .occ{ align-self:stretch; text-align:center; font-size:11px; font-weight:800; font-family:var(--mono); border-radius:5px; padding:1px 0; color:#fff; }

  /* hakediş tablosu + masaüstü */
  .tblwrap{ overflow-x:auto; }
  .tbl{ width:100%; border-collapse:collapse; font-size:13.5px; }
  .tbl th{ text-align:left; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-3); font-weight:700; padding:8px; border-bottom:1px solid var(--line); white-space:nowrap; }
  .tbl td{ padding:11px 8px; border-bottom:1px solid var(--line-soft); white-space:nowrap; }
  .tbl .num{ text-align:right; font-family:var(--mono); }
  .tbl tfoot td{ font-weight:800; border-top:1.5px solid var(--line); border-bottom:none; }
  .csvbtn{ display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; color:var(--accent); background:var(--accent-soft); padding:6px 10px; border-radius:8px; letter-spacing:0; text-transform:none; }
  .stat .n.money{ font-size:20px; }
  @media (min-width:900px){
    #app.wide{ max-width:1100px; }
    #app.wide .content{ padding:6px 28px 60px; }
    #app.wide .tabbar{ max-width:1100px; }
    #app.wide .h1{ font-size:34px; }
    #app.wide .stat .n.money{ font-size:26px; }
  }

  .chart{ display:flex; align-items:flex-end; gap:9px; height:130px; padding:10px 2px 0; }
  .barcol{ flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; height:100%; justify-content:flex-end; }

function normPhone(p){ let d=String(p||'').replace(/\D/g,''); if(d.length>10&&d.startsWith('90')) d=d.slice(2); if(d.length>10&&d.startsWith('0')) d=d.slice(1); if(d.length===11&&d.startsWith('0')) d=d.slice(1); return d; }
function fmtPhone(p){ const d=normPhone(p); if(d.length!==10) return p||''; return `0${d.slice(0,3)} ${d.slice(3,6)} ${d.slice(6,8)} ${d.slice(8)}`; }
function findUser(phone){ const p=normPhone(phone); if(!p) return null;
  const t=(S.trainers||[]).find(x=>normPhone(x.phone)===p); if(t) return {kind:t.owner?'admin':'trainer', id:t.id, rec:t};
  const s=(S.roster||[]).find(x=>normPhone(x.phone)===p); if(s) return {kind:'student', id:s.id, rec:s};
  return null; }
function sessionUser(){ const s=S.session; if(!s) return null;
  const rec=s.kind==='student'?S.roster.find(r=>r.id===s.id):(S.trainers||[]).find(t=>t.id===s.id);
  return rec?{kind:s.kind,id:s.id,rec}:null; }
function doLogin(){ const f=S.authForm; const u=findUser(f.phone);
  if(!u){ f.err='Bu telefon numarası kayıtlı değil'; save(); render(); return; }
  if(String(u.rec.pass||'')!==String(f.pass||'')){ f.err='Şifre hatalı'; save(); render(); return; }
  S.session={id:u.id,kind:u.kind}; S.role=u.kind; if(u.kind==='student') S.meId=u.id;
  if(u.kind==='admin'){ S.role='admin'; S.ownerView='admin'; }
  f.err=''; f.pass=''; f.phone=''; S.npForm={p1:'',p2:'',err:''}; save(); render();
  toast(`Hoş geldin, ${u.rec.name.split(' ')[0]}`); }
function logout(){ S.session=null; S.authForm={phone:'',pass:'',err:''}; save(); render(); }
function doNewPass(){ const f=S.npForm; const u=sessionUser(); if(!u) return;
  if(String(f.p1||'').length<4){ f.err='Şifre en az 4 karakter olmalı'; save(); render(); return; }
  if(f.p1!==f.p2){ f.err='Şifreler eşleşmiyor'; save(); render(); return; }
  u.rec.pass=f.p1; u.rec.mustChange=false; S.npForm={p1:'',p2:'',err:''};
  save(); render(); toast('Şifren güncellendi'); }

const member=id=>S.roster.find(r=>r.id===id);

/* ---------- iş mantığı ---------- */
function weekDatesFrom(off){ const m=new Date(S.mondayISO); m.setHours(12,0,0,0); const b=addDays(m,off*7); return Array.from({length:7},(_,i)=>addDays(b,i)); }
const trWeek=()=>weekDatesFrom(S.trWeek);
const bookWeek=()=>weekDatesFrom(S.bookWeek);
function availHours(tId,wd){ return ((S.availability[tId]||{})[wd]||[]).slice().sort((a,b)=>a-b); }
function activeReqs(tId,dISO){ return S.requests.filter(r=>r.trainerId===tId&&r.dateISO===dISO&&(r.status==='approved'||r.status==='pending')); }
function availHoursForDate(tId,d){ const ov=((S.availOverrides||{})[tId]||{})[iso(d)]; const base=(ov!==undefined?ov:((S.availability[tId]||{})[d.getDay()]||[])); return base.slice().sort((a,b)=>a-b); }
function freeHours(tId,d){ const taken=activeReqs(tId,iso(d)).map(r=>r.hour); return availHoursForDate(tId,d).filter(h=>!taken.includes(h)); }
function pendingFor(tId){ return S.requests.filter(r=>r.trainerId===tId&&r.status==='pending'); }
function studentsOf(tId){ return S.roster.filter(r=>r.trainers.includes(tId)); }
const pkgEnded=p=>p.used>=p.lessons||daysLeft(p.endISO)===0;
const tl=n=>Math.round(n||0).toLocaleString('tr-TR')+' ₺';
const perLesson=p=>(p&&p.lessons)?Math.round((p.price||0)/p.lessons):0;
const rateOf=id=>((S.rates||{})[id]!==undefined?S.rates[id]:50);
function payroll(monthOff){
  const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+monthOff);
  const y=d.getFullYear(), m=d.getMonth();
  const inMonth=r=>{ const dd=new Date(r.dateISO); return dd.getFullYear()===y&&dd.getMonth()===m; };
  return TRAINERS.map(t=>{ const ls=S.requests.filter(r=>r.trainerId===t.id&&r.status==='approved'&&inMonth(r));
    const gross=ls.reduce((a,r)=>a+(r.fee||0),0); const rate=rateOf(t.id);
    return {id:t.id,name:t.name,initials:t.initials,count:ls.length,gross,rate,pay:Math.round(gross*rate/100)}; })
    .filter(x=>x.count>0).sort((a,b)=>b.pay-a.pay);
}
function exportPayrollCSV(){
  const rows=payroll(S.repMonth); const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+S.repMonth);
  const head=['Hoca','Ders Adedi','Ciro (TL)','Odenecek (TL)'];
  const lines=[head.join(';')].concat(rows.map(r=>[r.name,r.count,r.gross,r.pay].join(';')));
  lines.push(['TOPLAM',rows.reduce((a,r)=>a+r.count,0),rows.reduce((a,r)=>a+r.gross,0),rows.reduce((a,r)=>a+r.pay,0)].join(';'));
  const blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`hakedis-${MONF[d.getMonth()]}-${d.getFullYear()}.csv`; document.body.appendChild(a); a.click(); a.remove();
  toast('CSV indirildi · Excel ile açabilirsin');
}

function setRateLive(id,v){ S.rates=S.rates||{}; S.rates[id]=Math.max(0,Math.min(100,parseInt(v)||0)); save(); }

function book(){
  const sel=bookWeek()[S.bookDayOffset]; const t=trainer(S.bookTrainer); const p=me().pkg;
  if(p.used>=p.lessons){ toast('Kotan dolu — talep açılamıyor'); return; }
  if(S.bookHour==null) return;
  S.requests.push({id:'r'+Date.now(),trainerId:S.bookTrainer,studentId:S.meId,studentName:me().name,initials:me().initials,dateISO:iso(sel),hour:S.bookHour,status:'pending',fee:perLesson(p)});

}
function approve(id){ const r=S.requests.find(x=>x.id===id); if(!r)return; r.status='approved'; const s=member(r.studentId);
  s.pkg.used=Math.min(s.pkg.lessons,s.pkg.used+1);
  if(s.id===S.meId) S.notifs.unshift({icon:'check',t:'Dersin onaylandı',d:`${trainer(r.trainerId).name} · ${hh(r.hour)}`,when:'şimdi'});
  save(); render(); toast('Onaylandı · kotadan düşüldü'); }
function reject(id){ const r=S.requests.find(x=>x.id===id); if(!r)return; r.status='rejected';

  save(); render(); toast('Reddedildi · dilim açıldı'); }
function moveLesson(rid,newHour){ const r=S.requests.find(x=>x.id===rid); if(!r||r.hour===newHour) return;
  const old=r.hour; r.hour=newHour;
  const s=member(r.studentId);
  S.notifs.unshift({icon:'refresh',t:'Ders saati değişti',d:`${firstName(r.trainerId)} Hoca · ${hh(old)} → ${hh(newHour)}`,when:'şimdi'});
  save(); render(); toast(`${s.name}: ${hh(old)} → ${hh(newHour)} · öğrenciye bildirildi`); }
function extendMonths(id,m){ const p=member(id).pkg; p.endISO=iso(addDays(new Date(p.endISO),m*30)); p.months+=m; save(); render(); toast(`${member(id).name.split(' ')[0]} · süre +${m} ay uzatıldı`); }
function addLessons(id,n){ member(id).pkg.lessons+=n; save(); render(); toast(`${member(id).name.split(' ')[0]} · +${n} ders`); }
function avSelDate(){ const wk=weekDatesFrom(S.avWeek); return wk.find(x=>x.getDay()===S.availDay)||wk[0]; }
function avToggle(hr){ const T=curTrainer();
  if(S.avMode==='date'){ const d=avSelDate(); const k=iso(d); S.availOverrides=S.availOverrides||{}; S.availOverrides[T]=S.availOverrides[T]||{};
    if(S.availOverrides[T][k]===undefined) S.availOverrides[T][k]=[...availHours(T,d.getDay())];
    const a=S.availOverrides[T][k]; const i=a.indexOf(hr); if(i>=0)a.splice(i,1); else a.push(hr);
  } else { const wd=S.availDay; S.availability[T]=S.availability[T]||{}; const a=(S.availability[T][wd]=S.availability[T][wd]||[]); const i=a.indexOf(hr); if(i>=0)a.splice(i,1); else a.push(hr); }
  save(); render(); }
function avCur(){ const T=curTrainer(); return S.avMode==='date'?availHoursForDate(T,avSelDate()):availHours(T,S.availDay); }
function avSet(hours){ const T=curTrainer(); const hs=[...new Set(hours)].sort((a,b)=>a-b);
  if(S.avMode==='date'){ const d=avSelDate(); S.availOverrides=S.availOverrides||{}; S.availOverrides[T]=S.availOverrides[T]||{}; S.availOverrides[T][iso(d)]=hs; }
  else { S.availability[T]=S.availability[T]||{}; S.availability[T][S.availDay]=hs; }
  save(); render(); }
function avPreset(a,b){ const cur=avCur(); const add=[]; for(let h=a;h<b;h++) add.push(h); avSet(cur.concat(add)); }
function avClear(){ avSet([]); }
function avApplyTo(days){ const T=curTrainer(); const src=avCur(); S.availability[T]=S.availability[T]||{};
  days.forEach(d=>{ S.availability[T][d]=src.slice(); }); save(); render();
  toast(days.length>5?'Tüm haftaya uygulandı':'Hafta içine uygulandı'); }

function clearOverride(k){ const T=curTrainer(); if(S.availOverrides&&S.availOverrides[T]) delete S.availOverrides[T][k]; save(); render(); toast('Bu tarih tekrar haftalık düzene döndü'); }
function deleteLesson(rid){ const r=S.requests.find(x=>x.id===rid); if(!r) return; const s=member(r.studentId); const nm=s?s.name.split(' ')[0]:'Ders';

/* öğrenci: dersi taşı / iptal et (hoca onayıyla) */

function closeLesson(){ S.lessonSheet=null; save(); render(); }

function withdrawChange(rid){ const r=S.requests.find(x=>x.id===rid); if(!r)return; r.pending2=null; S.lessonSheet=null; save(); render(); toast('Talep geri alındı'); }
function startMove(rid){ const r=S.requests.find(x=>x.id===rid); if(!r)return; S.moveLessonId=rid; S.bookTrainer=r.trainerId; S.bookHour=null; S.bookWeek=0; S.bookDayOffset=S.dayOffset; S.lessonSheet=null; S.screen.student='reschedule'; save(); render(); }
function cancelMove(){ S.moveLessonId=null; S.bookHour=null; S.screen.student='home'; save(); render(); }
function confirmMove(){ const r=S.requests.find(x=>x.id===S.moveLessonId); if(!r||S.bookHour==null)return;

}
function lessonSheet(){ if(!S.lessonSheet) return ''; const r=S.requests.find(x=>x.id===S.lessonSheet); if(!r) return '';

/* ===== HOCA (ve yönetici tüm hocalar için) ===== */
function curTrainer(){ const s=S.session;
  if(!s) return 't1';
  if(s.kind==='trainer') return s.id;
  if(s.kind==='admin') return (S.ownerView==='trainer'&&S.role==='trainer')?s.id:(S.adminTrainer||'t1');
  return 't1'; }
function renderTrainer(){
  const sc=S.screen.trainer; const T=curTrainer(); const tr=trainer(T)||{name:'',initials:''};
  const ab=(title,sub)=>`<div class="appbar"><div><div class="eyebrow">${tr.name}</div><div class="h1">${title}</div>${sub?`<div class="subline">${sub}</div>`:''}</div><div class="avatar">${tr.initials}</div></div>`;
  if(sc==='avail') return ab('Müsaitlik','Gün seç, ders vereceğin saatleri aç')+availBody();
  if(sc==='students') return renderTrStudents();
  if(sc==='notifs'){ const pend=pendingFor(T);
    return ab('Bildirimler')+`<div class="sect">Onay bekleyen</div>${pend.length?pend.map(pendCard).join(''):`<div class="empty">Bekleyen talep yok</div>`}`; }
  return ab('Takvim')+agendaBody();
}
function pendCard(r){ return `<div class="card" style="padding:14px"><div class="row" style="background:none;border:none;padding:0 0 12px"><div class="mono-av wait">${r.initials}</div><div class="grow"><div class="t">${r.studentName}</div><div class="d mono">${DOW[new Date(r.dateISO).getDay()]} ${fmtShort(r.dateISO)} · ${hh(r.hour)}</div></div></div><div class="btnrow"><button class="b-ok" onclick="approve('${r.id}')">${ic('check',16)} Onayla</button><button class="b-no" onclick="reject('${r.id}')">${ic('x',16)} Reddet</button></div></div>`; }

function changeReqs(T){ return S.requests.filter(r=>r.trainerId===T && r.status==='approved' && r.pending2); }
function changeCard(r){ const sd=r.dateISO===iso(new Date()); const c=r.pending2;
  if(c.type==='cancel'){
    return `<div class="card" style="padding:14px"><div class="row" style="background:none;border:none;padding:0 0 6px"><div class="mono-av stop">${r.initials}</div><div class="grow"><div class="t">${r.studentName} · iptal istiyor</div><div class="d mono">${DOW[new Date(r.dateISO).getDay()]} ${fmtShort(r.dateISO)} · ${hh(r.hour)}</div></div></div>
      <div class="d" style="margin:0 2px 10px; color:${sd?'var(--stop)':'var(--ok)'}">${sd?'Aynı gün — onayında öğrencinin hakkı yanar':'Onayında hak iade edilir'}</div>
      <div class="btnrow"><button class="b-ok" onclick="approveChange('${r.id}')">${ic('check',16)} İptali onayla</button><button class="b-no" onclick="rejectChange('${r.id}')">${ic('x',16)} Reddet</button></div></div>`; }
  return `<div class="card" style="padding:14px"><div class="row" style="background:none;border:none;padding:0 0 6px"><div class="mono-av wait">${r.initials}</div><div class="grow"><div class="t">${r.studentName} · taşımak istiyor</div><div class="d mono">${DOW[new Date(r.dateISO).getDay()]} ${hh(r.hour)} → ${DOW[new Date(c.dateISO).getDay()]} ${fmtShort(c.dateISO)} ${hh(c.hour)}</div></div></div>
    <div class="btnrow"><button class="b-ok" onclick="approveChange('${r.id}')">${ic('check',16)} Taşımayı onayla</button><button class="b-no" onclick="rejectChange('${r.id}')">${ic('x',16)} Reddet</button></div></div>`; }
function approveChange(rid){ const r=S.requests.find(x=>x.id===rid); if(!r||!r.pending2)return; const c=r.pending2; const s=member(r.studentId);
  if(c.type==='cancel'){ const sd=r.dateISO===iso(new Date());
    if(!sd && s) s.pkg.used=Math.max(0,s.pkg.used-1);
    if(s && s.id===S.meId) S.log.unshift({dateISO:r.dateISO,trainer:firstName(r.trainerId)+' H.',kind:sd?'burn':'refund',delta:sd?-1:1});
    r.status='cancelled'; r.pending2=null;
    S.notifs.unshift({icon:'x',t:'İptal onaylandı',d:`${firstName(r.trainerId)} Hoca · ${hh(r.hour)} · ${sd?'hak yandı':'hak iade'}`,when:'şimdi'});
    save(); render(); toast(`İptal onaylandı · ${sd?'hak yandı':'hak iade edildi'}`); return; }
  const taken=activeReqs(r.trainerId,c.dateISO).some(x=>x.id!==r.id&&x.hour===c.hour);
  if(taken){ toast('Hedef saat dolu — taşınamadı'); return; }
  r.dateISO=c.dateISO; r.hour=c.hour; r.pending2=null;
  S.notifs.unshift({icon:'refresh',t:'Taşıma onaylandı',d:`${firstName(r.trainerId)} Hoca · ${DOW[new Date(r.dateISO).getDay()]} ${hh(r.hour)}`,when:'şimdi'});
  save(); render(); toast('Taşıma onaylandı'); }
function rejectChange(rid){ const r=S.requests.find(x=>x.id===rid); if(!r||!r.pending2)return; const t=r.pending2.type; r.pending2=null;
  S.notifs.unshift({icon:'x',t:(t==='cancel'?'İptal reddedildi':'Taşıma reddedildi'),d:`${firstName(r.trainerId)} Hoca · ders duruyor`,when:'şimdi'});
  save(); render(); toast(t==='cancel'?'İptal reddedildi':'Taşıma reddedildi'); }
function pendBlock(){ const T=curTrainer(); const pend=pendingFor(T); const chg=changeReqs(T); let h='';
  if(pend.length) h+=`<div class="sect">Onay bekleyen · ${pend.length}</div>`+pend.map(pendCard).join('');
  if(chg.length) h+=`<div class="sect">Değişiklik talepleri · ${chg.length}</div>`+chg.map(changeCard).join('');
  return h; }
function agendaBody(){
  const T=curTrainer(); const isMonth=S.agendaView==='month';
  const toggle=`<div class="toggle"><button class="${!isMonth?'on':''}" onclick="setAgenda('day')">Gün</button><button class="${isMonth?'on':''}" onclick="setAgenda('month')">Ay</button></div>`;
  if(isMonth) return toggle+renderMonth()+pendBlock();
  const week=trWeek(); const off=S.dayOffset, sel=week[off];
  const open=availHoursForDate(T,sel);
  const rows=open.length?open.map(h=>{ const r=activeReqs(T,iso(sel)).find(x=>x.hour===h);
    if(!r) return `<div class="tlrow"><span class="time">${hh(h)}</span><div class="slotcard empty" data-drop="1" data-hour="${h}" onclick="openAdd(${h})"><span>Boş</span><span class="addhint">+ Öğrenci ekle</span></div></div>`;
    const isNow=sameDay(sel,new Date())&&new Date().getHours()===h; const cls=r.status==='pending'?'wait':'ok';
    return `<div class="tlrow"><span class="time">${hh(h)}</span><div class="slotcard ${isNow?'now':''}" data-reqid="${r.id}"><div class="grip">${ic('grip',16)}</div><div class="mono-av ${cls==='wait'?'wait':''}">${r.initials}</div><div class="grow"><div class="t">${r.studentName}${isNow?' · sırada':''}</div><div class="d">${cls==='wait'?'Onay bekliyor':'Onaylı'}</div></div><span class="tag ${cls}">${cls==='wait'?'Bekliyor':'Onaylı'}</span><button class="lesdel" onclick="deleteLesson('${r.id}')">${ic('trash',15)}</button></div></div>`; }).join(''):`<div class="empty">Bu gün kapalı — Müsaitlik'ten saat aç</div>`;
  return toggle+weekNav(week,'trWeekShift(-1)','trWeekShift(1)',false)
    +`<div class="days">${week.map((d,i)=>`<div class="day ${i===off?'on':''}" onclick="setDay(${i})">${DOW[d.getDay()]}<span class="n">${d.getDate()}</span></div>`).join('')}</div>`
    +pendBlock()
    +`<div class="sect">${sameDay(sel,new Date())?'Bugün':fmtDay(sel)} · akış</div>`
    +(open.length?`<div class="draghint">${ic('moveArrow',15)} Dersi kulptan tut & sürükle · çöp ikonuyla sil</div>`:'')
    +`<div class="tl">${rows}</div>`;
}
function renderMonth(){
  const T=curTrainer();
  const base=new Date(); base.setHours(12,0,0,0); base.setDate(1); base.setMonth(base.getMonth()+S.monthOff);
  const y=base.getFullYear(), m=base.getMonth();
  const first=new Date(y,m,1); const lead=(first.getDay()===0?6:first.getDay()-1); const dim=new Date(y,m+1,0).getDate();
  const cells=[]; for(let i=0;i<lead;i++)cells.push(null); for(let d=1;d<=dim;d++)cells.push(new Date(y,m,d,12)); while(cells.length%7)cells.push(null);
  const tISO=iso(new Date());
  const heads=['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'].map(x=>`<span class="mh">${x}</span>`).join('');
  const grid=cells.map(d=>{ if(!d) return `<div class="mcell out"></div>`;
    const dISO=iso(d), occ=activeReqs(T,dISO).length, today=dISO===tISO;
    return `<div class="mcell ${today?'today':''}" onclick="gotoDate('${dISO}')"><span class="dnum">${d.getDate()}</span>${occ>0?`<span class="occ" style="background:color-mix(in srgb,var(--accent) ${Math.min(100,42+occ*13)}%,var(--surface-3))">${occ}</span>`:''}</div>`; }).join('');
  return `<div class="weeknav"><button class="navbtn" onclick="monthShift(-1)">${ic('chevronL',20)}</button>
    <div class="wncenter"><div class="wnrange">${MONF[m]}</div><div class="wnmonth">${y}</div></div>
    <button class="navbtn" onclick="monthShift(1)">${ic('chevronR',20)}</button></div>
    <div class="card" style="padding:13px 11px"><div class="mgrid" style="margin-bottom:6px">${heads}</div><div class="mgrid">${grid}</div></div>
    <div class="draghint">${ic('clock',15)} Kutudaki rakam = o gün dolu saat sayısı · güne dokun</div>`;
}
function gotoDate(dISO){ const t=new Date(dISO); t.setHours(12,0,0,0);
  const mon0=new Date(S.mondayISO); mon0.setHours(12,0,0,0);
  const tmon=addDays(t,(t.getDay()===0?-6:1-t.getDay()));
  S.trWeek=Math.round((tmon-mon0)/(7*864e5)); S.dayOffset=(t.getDay()===0?6:t.getDay()-1); S.agendaView='day'; save(); render(); }
function monthShift(d){ S.monthOff+=d; save(); render(); }
function sameDay(a,b){ return iso(a)===iso(b); }

function availBody(){
  const T=curTrainer(); const wk=weekDatesFrom(S.avWeek); const wd=S.availDay; const sel=wk.find(x=>x.getDay()===wd)||wk[0];
  const dateMode=S.avMode==='date';
  const open=dateMode?availHoursForDate(T,sel):availHours(T,wd);
  const ranges=[]; let s=null,pv=null; open.forEach(h=>{ if(s===null){s=h;pv=h;} else if(h===pv+1){pv=h;} else {ranges.push([s,pv+1]); s=h; pv=h;} }); if(s!==null)ranges.push([s,pv+1]);
  const hasOv=k=>((S.availOverrides||{})[T]||{})[k]!==undefined;
  return `${weekNav(wk,'avWeekShift(-1)','avWeekShift(1)',false)}
  <div class="days">${wk.map(d=>`<div class="day ${d.getDay()===wd?'on':''}" onclick="setAvailDay(${d.getDay()})">${DOW[d.getDay()]}<span class="n">${d.getDate()}</span>${hasOv(iso(d))?'<span class="ovdot"></span>':''}</div>`).join('')}</div>
  <div class="modebar">
    <span class="modelbl">Uygula</span>
    <button class="mchip ${!dateMode?'on':''}" onclick="setAvMode('recurring')">Her ${DOW[wd]}</button>
    <button class="mchip ${dateMode?'on':''}" onclick="setAvMode('date')">${sel.getDate()} ${MON[sel.getMonth()]}</button>

      <input type="number" min="1" inputmode="numeric" value="${d.lessons}" oninput="S.def.lessons=this.value"><span class="hint">İstediğin sayıyı yaz — sabit değil</span></div>
    <div class="field"><label>Süre (ay)</label><input type="number" min="1" inputmode="numeric" value="${d.months}" oninput="S.def.months=this.value"><span class="hint">Yeni paket · kullanım sıfırlanır</span></div>
    <div class="field"><label>Paket ücreti (₺)</label><input type="number" min="0" inputmode="numeric" value="${d.price||0}" oninput="S.def.price=this.value"><span class="hint">Ders başı ≈ ${tl(Math.round((parseInt(d.price)||0)/Math.max(1,parseInt(d.lessons)||1)))} · hoca hakedişi bundan hesaplanır</span></div>
    <button class="btn" onclick="defineSubmit()">${ic('check',18)} Paketi Tanımla</button>
  </div>`;
}

/* ===== TABBAR ===== */
function renderTabs(){
  const pend=pendingFor(curTrainer()).length+changeReqs(curTrainer()).length; const pendAll=S.requests.filter(r=>r.status==='pending'||(r.status==='approved'&&r.pending2)).length;
  const defs={ student:[['home','home','Ana'],['book','calendar','Ders Al'],['package','ticket','Paket'],['notifs','bell','Bildirim']],
    trainer:[['agenda','calendar','Takvim'],['avail','slider','Müsaitlik'],['students','users','Öğrenci'],['notifs','bell','Bildirim']],
    admin:[['reports','chart','Rapor'],['members','users','Üye'],['trainers','calendar','Hoca'],['panel','building','Panel']] }[S.role];
  const cur=S.screen[S.role];
  return `<div class="tabbar">${defs.map(x=>{ const on=cur===x[0]||(x[0]==='reports'&&cur==='payroll');
    const badge=(S.role==='trainer'&&(x[0]==='notifs'||x[0]==='agenda')&&pend)?`<span class="badge">${pend}</span>`:(S.role==='admin'&&x[0]==='trainers'&&pendAll?`<span class="badge">${pendAll}</span>`:'');
    return `<button class="tb ${on?'on':''}" onclick="go('${x[0]}')">${ic(x[1],22)}<span>${x[2]}</span>${badge}</button>`; }).join('')}</div>`;
}
function notifScreen(av){
  return `<div class="appbar"><div><div class="eyebrow">Bildirimler</div><div class="h1">Akış</div></div><div class="avatar">${av}</div></div>
  ${S.notifs.map(n=>`<div class="row"><div class="ic acc">${ic(n.icon,18)}</div><div class="grow"><div class="t">${n.t}</div><div class="d">${n.d}</div></div><span class="tag mut">${n.when}</span></div>`).join('')}`;
}

/* ---------- sürükle-bırak (pointer, mobil uyumlu) ---------- */
let drag=null;
function ghostMove(e){ if(drag&&drag.g){ drag.g.style.left=e.clientX+'px'; drag.g.style.top=e.clientY+'px'; } }
document.addEventListener('pointerdown',e=>{ const grip=e.target.closest&&e.target.closest('.grip'); if(!grip)return;
  const card=grip.closest('[data-reqid]'); if(!card)return; e.preventDefault();
  const rid=card.dataset.reqid; const r=S.requests.find(x=>x.id===rid); if(!r)return;
  const g=document.createElement('div'); g.className='dragghost'; g.textContent=r.studentName+' · yeni saat'; document.body.appendChild(g);
  drag={rid,g,target:null}; ghostMove(e); card.classList.add('dragging');
},{passive:false});
document.addEventListener('pointermove',e=>{ if(!drag)return; e.preventDefault(); ghostMove(e);
  const el=document.elementFromPoint(e.clientX,e.clientY); const slot=el&&el.closest&&el.closest('[data-drop]');
  document.querySelectorAll('.dragover').forEach(x=>x.classList.remove('dragover'));
  if(slot){ slot.classList.add('dragover'); drag.target=slot.dataset.hour; } else drag.target=null;
},{passive:false});
document.addEventListener('pointerup',()=>{ if(!drag)return; const t=drag.target,rid=drag.rid; drag.g.remove();
  document.querySelectorAll('.dragover').forEach(x=>x.classList.remove('dragover')); drag=null;
  if(t!=null){ window._dragJust=Date.now(); moveLesson(rid,+t); } },{passive:false});

/* ---------- başlat ---------- */
load(); render();
if('serviceWorker' in navigator){ window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{})); }
</script>
