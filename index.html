<!doctype html>
<html lang="tr">
<head>

<style>
  :root{
    --bg:#07080d; --ink:#f2f3fa; --ink-soft:#a6abbe; --ink-faint:#666b7e;
    --surface:#12141c; --surface-2:#1a1d27; --surface-3:#222634; --line:#252938; --line-soft:#1c1f2b;
    --accent:#7b74ff; --accent-2:#c07bff; --accent-ink:#b9b4ff;
    --ok:#2ee08a; --ok-bg:#0f3324; --wait:#f5b13d; --wait-bg:#3a2c10; --stop:#ff5c88; --stop-bg:#3a1424;
    --grad:linear-gradient(140deg,var(--accent),var(--accent-2));
    --font:"SF Pro Display",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f4f5fa; --ink:#0c0e16; --ink-soft:#55596b; --ink-faint:#9599ab;
      --surface:#ffffff; --surface-2:#f6f7fb; --surface-3:#eef0f6; --line:#ececf3; --line-soft:#f1f2f7;
      --accent:#635bff; --accent-2:#a855f7; --accent-ink:#4b45cc;
      --ok:#14b866; --ok-bg:#e3f8ee; --wait:#e6960a; --wait-bg:#fcf1da; --stop:#f0356b; --stop-bg:#fde4ec; }
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{ font-family:var(--font); color:var(--ink); background:var(--bg); -webkit-font-smoothing:antialiased; overscroll-behavior-y:none; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  input,select{ font-family:inherit; }
  #app{ max-width:520px; margin:0 auto; min-height:100%; display:flex; flex-direction:column; position:relative; }

  .demobar{ position:sticky; top:0; z-index:30; padding:calc(var(--safe-t) + 7px) 12px 8px;
    background:color-mix(in srgb,var(--bg) 82%,transparent); backdrop-filter:blur(14px); border-bottom:1px solid var(--line-soft); }
  .demobar .lbl{ font-size:9px; font-weight:800; letter-spacing:.16em; color:var(--ink-faint); text-transform:uppercase; margin:0 2px 6px; display:flex; justify-content:space-between; align-items:center;}
  .demobar .reset{ font-size:10px; font-weight:700; color:var(--accent); letter-spacing:0; text-transform:none; }
  .seg{ display:flex; gap:5px; background:var(--surface-2); border:1px solid var(--line); border-radius:13px; padding:4px; }
  .seg button{ flex:1; padding:9px 4px; border-radius:9px; font-size:12.5px; font-weight:700; color:var(--ink-soft); letter-spacing:-.01em; }
  .seg button.on{ background:var(--grad); color:#fff; box-shadow:0 6px 16px -8px color-mix(in srgb,var(--accent) 70%,transparent); }

  .appbar{ padding:14px 18px 8px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .appbar .title{ font-size:23px; font-weight:800; letter-spacing:-.03em; }
  .appbar .sub{ font-size:12.5px; color:var(--ink-faint); margin-top:2px; font-weight:500; }
  .avatar{ width:40px;height:40px;border-radius:14px; background:var(--grad); color:#fff; display:flex;align-items:center;justify-content:center; font-weight:700; font-size:14px; flex:none; box-shadow:0 8px 18px -10px color-mix(in srgb,var(--accent) 70%,transparent); }
  .back{ font-size:15px; font-weight:700; color:var(--accent); display:inline-flex; align-items:center; gap:5px; }

  .content{ flex:1; padding:4px 15px 110px; display:flex; flex-direction:column; gap:13px; }
  .sect{ font-size:11px; font-weight:800; letter-spacing:.1em; color:var(--ink-faint); text-transform:uppercase; margin:6px 2px -3px; }

  .card{ background:var(--surface-2); border:1px solid var(--line); border-radius:20px; padding:16px; }
  .card.hero{ position:relative; overflow:hidden; border:none; color:#fff; background:var(--grad); box-shadow:0 18px 38px -18px color-mix(in srgb,var(--accent) 70%,transparent); }
  .hero::after{ content:""; position:absolute; inset:0; background:radial-gradient(240px 130px at 85% -25%,rgba(255,255,255,.32),transparent 70%); pointer-events:none; }
  .hero .label{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; opacity:.9; font-weight:700; }
  .hero .big{ font-size:42px; font-weight:800; letter-spacing:-.03em; margin-top:6px; line-height:1; }
  .hero .big small{ font-size:16px; font-weight:600; opacity:.82; letter-spacing:0; }
  .hero .meta{ display:flex; justify-content:space-between; margin-top:15px; font-size:12.5px; opacity:.95; font-weight:500; }
  .bar{ height:9px; border-radius:99px; background:rgba(255,255,255,.26); margin-top:14px; overflow:hidden; }
  .bar>span{ display:block; height:100%; background:#fff; border-radius:99px; transition:width .5s; }

  .row{ display:flex; align-items:center; gap:13px; padding:13px; background:var(--surface-2); border:1px solid var(--line); border-radius:16px; }
  .row .ic{ width:42px;height:42px;border-radius:13px; display:flex;align-items:center;justify-content:center; font-size:17px; flex:none; }
  .ic.blue{ background:color-mix(in srgb,var(--accent) 16%,transparent);} .ic.ok{ background:var(--ok-bg);} .ic.wait{ background:var(--wait-bg);} .ic.stop{ background:var(--stop-bg);}
  .miniav{ width:42px;height:42px;border-radius:13px; color:#fff; background:var(--grad); display:flex;align-items:center;justify-content:center; font-weight:700; font-size:14px; flex:none; }
  .miniav.wait{ background:var(--wait-bg); color:var(--wait);} .miniav.stop{ background:var(--stop-bg); color:var(--stop);}
  .row .grow,.grow{ flex:1; min-width:0; }
  .row .t,.t{ font-size:14.5px; font-weight:700; letter-spacing:-.01em; }
  .row .d,.d{ font-size:12px; color:var(--ink-faint); margin-top:2px; font-weight:500; }
  .pill{ font-size:11px; font-weight:700; padding:6px 11px; border-radius:99px; white-space:nowrap; }
  .pill.ok{ background:var(--ok-bg); color:var(--ok);} .pill.wait{ background:var(--wait-bg); color:var(--wait);} .pill.stop{ background:var(--stop-bg); color:var(--stop);} .pill.mut{ background:var(--surface-3); color:var(--ink-faint);}

  .btn{ background:var(--grad); color:#fff; border-radius:16px; padding:16px; font-size:15px; font-weight:700; text-align:center; width:100%; box-shadow:0 14px 28px -14px color-mix(in srgb,var(--accent) 70%,transparent); }
  .btn:active{ transform:scale(.985); }
  .btn.ghost{ background:var(--surface); color:var(--accent); border:1.5px solid color-mix(in srgb,var(--accent) 32%,transparent); box-shadow:none; }
  .btn.sm{ padding:11px; font-size:13px; border-radius:13px; box-shadow:none; }
  .btn[disabled]{ opacity:.4; pointer-events:none; }
  .btnrow{ display:flex; gap:9px; }
  .b-ok{ background:var(--ok); color:#fff; border-radius:13px; padding:12px; font-weight:700; font-size:13.5px; flex:1;}
  .b-no{ background:var(--stop-bg); color:var(--stop); border-radius:13px; padding:12px; font-weight:700; font-size:13.5px; flex:1;}

  .field{ display:flex; flex-direction:column; gap:7px; margin-bottom:13px; }
  .field label{ font-size:12px; font-weight:700; color:var(--ink-soft); }
  .field input,.field select{ background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:13px; font-size:16px; color:var(--ink); width:100%; -webkit-appearance:none; appearance:none; }
  .field .hint{ font-size:11px; color:var(--ink-faint); font-weight:500; }
  .checks{ display:flex; gap:8px; }
  .chk{ flex:1; padding:12px 6px; border-radius:12px; border:1px solid var(--line); background:var(--surface); font-size:13px; font-weight:700; text-align:center; color:var(--ink-soft); }
  .chk.on{ background:var(--grad); color:#fff; border-color:transparent; }
  .chips{ display:flex; gap:6px; flex-wrap:wrap; }
  .chip{ font-size:10.5px; font-weight:700; padding:5px 10px; border-radius:99px; background:var(--surface-3); color:var(--ink-soft); }
  .quickrow{ display:flex; gap:7px; flex-wrap:wrap; }
  .quick{ padding:9px 13px; border-radius:11px; border:1px solid var(--line); background:var(--surface); font-size:13px; font-weight:700; color:var(--ink-soft); }
  .quick.on{ background:var(--grad); color:#fff; border-color:transparent; }

  .days{ display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
  .days::-webkit-scrollbar{ display:none; }
  .day{ flex:0 0 auto; min-width:46px; text-align:center; padding:10px 4px; border-radius:14px; font-size:11.5px; font-weight:700; background:var(--surface-2); border:1px solid var(--line); color:var(--ink-soft); }
  .day.on{ background:var(--grad); color:#fff; border-color:transparent; }
  .day.off{ opacity:.4; } .day .n{ display:block; font-size:16px; margin-top:3px; font-variant-numeric:tabular-nums; }

  .slots{ display:grid; grid-template-columns:repeat(3,1fr); gap:9px; }
  .slot{ text-align:center; font-size:14px; font-weight:700; padding:14px 4px; border-radius:14px; border:1px solid var(--line); background:var(--surface-2); color:var(--ink); font-variant-numeric:tabular-nums; }
  .slot.free{ border-color:color-mix(in srgb,var(--ok) 42%,transparent); color:var(--ok); background:var(--ok-bg); }
  .slot.sel{ background:var(--grad); border-color:transparent; color:#fff; box-shadow:0 10px 20px -10px color-mix(in srgb,var(--accent) 70%,transparent); }
  .slot.busy{ color:var(--ink-faint); opacity:.45; text-decoration:line-through; }

  .stat2{ display:grid; grid-template-columns:1fr 1fr; gap:11px; }
  .stat{ background:var(--surface-2); border:1px solid var(--line); border-radius:17px; padding:15px; }
  .stat .n{ font-size:28px; font-weight:800; letter-spacing:-.03em; font-variant-numeric:tabular-nums; }
  .stat .n .u{ font-size:14px; color:var(--ink-faint); font-weight:600; }
  .stat .l{ font-size:11.5px; color:var(--ink-faint); margin-top:4px; font-weight:600; }
  .stat .tr{ font-size:11px; font-weight:700; margin-top:7px;} .up{color:var(--ok);} .down{color:var(--stop);}

  .toggle{ display:flex; background:var(--surface-2); border:1px solid var(--line); border-radius:13px; padding:4px; }
  .toggle button{ flex:1; padding:9px; border-radius:9px; font-size:13px; font-weight:700; color:var(--ink-soft); }
  .toggle button.on{ background:var(--grad); color:#fff; }

  .tl{ display:flex; flex-direction:column; gap:9px; }
  .tlrow{ display:flex; gap:11px; align-items:stretch; }
  .tlrow .time{ width:46px; flex:none; font-size:12px; font-weight:700; color:var(--ink-faint); padding-top:16px; font-variant-numeric:tabular-nums; text-align:right; }
  .slotcard{ flex:1; display:flex; align-items:center; gap:12px; padding:12px; border-radius:16px; border:1px solid var(--line); background:var(--surface-2); position:relative; overflow:hidden; }
  .slotcard.empty{ border-style:dashed; background:transparent; color:var(--ink-faint); font-size:12.5px; font-weight:600; justify-content:center; }
  .slotcard .lead{ position:absolute; left:0; top:0; bottom:0; width:4px; }
  .lead.ok{ background:var(--ok);} .lead.wait{ background:var(--wait);}

  .wgrid{ display:grid; grid-template-columns:20px repeat(7,1fr); gap:4px; }
  .wgrid .h{ font-size:9.5px; font-weight:700; color:var(--ink-faint); text-align:center; }
  .wgrid .tlab{ font-size:9.5px; font-weight:700; color:var(--ink-faint); display:flex; align-items:center; justify-content:flex-end; padding-right:2px; }
  .cell{ height:34px; border-radius:9px; background:var(--surface-2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:800; color:#fff; letter-spacing:-.02em; }
  .cell.free{ background:transparent; border-style:dashed; } .cell.ok{ background:var(--accent); border-color:transparent; } .cell.wait{ background:var(--wait); border-color:transparent;}

  .chart{ display:flex; align-items:flex-end; gap:10px; height:132px; padding:8px 2px 0; }
  .barcol{ flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; height:100%; justify-content:flex-end; }
  .barcol .stick{ width:100%; border-radius:8px 8px 4px 4px; background:linear-gradient(180deg,var(--accent),color-mix(in srgb,var(--accent-2) 70%,var(--accent))); transition:height .5s;}
  .barcol .stick.dim{ background:color-mix(in srgb,var(--accent) 24%,var(--surface-2)); }
  .barcol .lab{ font-size:10.5px; font-weight:600; color:var(--ink-faint);} .barcol .val{ font-size:10.5px; font-weight:700; font-variant-numeric:tabular-nums;}
  .lgrow{ display:flex; align-items:center; gap:11px; }
  .lgrow .sw{ width:10px;height:10px;border-radius:3px; flex:none; }
  .track{ height:8px; border-radius:99px; background:var(--surface); overflow:hidden; margin-top:6px; border:1px solid var(--line);} .track>span{ display:block;height:100%;border-radius:99px;}
  .rowspace{ display:flex; justify-content:space-between; font-weight:700; font-size:13.5px; }

  .tabbar{ position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:520px; z-index:30;
    display:flex; justify-content:space-around; padding:9px 8px calc(var(--safe-b) + 11px);
    background:color-mix(in srgb,var(--bg) 84%,transparent); backdrop-filter:blur(16px); border-top:1px solid var(--line-soft); }
  .tb{ display:flex; flex-direction:column; align-items:center; gap:4px; font-size:10px; font-weight:600; color:var(--ink-faint); padding:2px 10px; position:relative; }
  .tb.on{ color:var(--accent); } .tb .g{ font-size:20px; }
  .tb .badge{ position:absolute; top:-3px; right:2px; min-width:16px; height:16px; padding:0 4px; border-radius:99px; background:var(--stop); color:#fff; font-size:9px; font-weight:800; display:flex; align-items:center; justify-content:center; }

  .empty{ text-align:center; color:var(--ink-faint); font-size:13px; padding:26px 10px; font-weight:500; }
  .toast{ position:fixed; bottom:calc(var(--safe-b) + 84px); left:50%; transform:translateX(-50%) translateY(20px); z-index:60;
    background:var(--ink); color:var(--bg); padding:12px 18px; border-radius:14px; font-size:13.5px; font-weight:700; opacity:0; transition:.3s; box-shadow:0 12px 30px -10px rgba(0,0,0,.5); max-width:88%; text-align:center;}
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .fadein{ animation:fade .35s ease; } @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  @media (prefers-reduced-motion: reduce){ *{ animation:none!important; transition:none!important; } }
</style>

<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
/* ---------- yardımcılar ---------- */
const DOW=['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
const MON=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
const pad=n=>String(n).padStart(2,'0');
const iso=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const addDays=(base,n)=>{ const d=new Date(base); d.setHours(12,0,0,0); d.setDate(d.getDate()+n); return d; };
const fmtDay=d=>`${DOW[d.getDay()]} ${d.getDate()} ${MON[d.getMonth()]}`;
const fmtShort=s=>{ const d=new Date(s); return `${d.getDate()} ${MON[d.getMonth()]}`; };
const hh=h=>pad(h)+':00';
const daysLeft=endISO=>Math.max(0,Math.round((new Date(endISO)-new Date())/864e5));
const $=id=>document.getElementById(id);
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }

/* ---------- statik tanımlar ---------- */
const KEY='pt_demo_v2';
const TRAINERS=[
  {id:'t1',name:'Ahmet Yılmaz',initials:'AY',hours:[10,11,12,18,19,20,21,22],workDays:[1,2,3,4,5,6]},
  {id:'t2',name:'Ceren Aksoy',initials:'CA',hours:[9,10,11,17,18,19,20],workDays:[1,2,3,4,5]},
];
const trainer=id=>TRAINERS.find(t=>t.id===id);
const firstName=id=>trainer(id).name.split(' ')[0];

/* ---------- demo verisi ---------- */
function seed(){
  const now=new Date(); now.setHours(12,0,0,0);
  const monday=addDays(now,(now.getDay()===0?-6:1-now.getDay()));
  const start=addDays(now,-51), end=addDays(now,39);
  // öğrenci listesi (roster) — her öğrenciye atanmış hoca(lar)
  const P=[['Mehmet Barış','MB'],['Ela Tan','ET'],['Rüya Yıldız','RY'],['Deniz Kaya','DK'],['Levent Mor','LM'],['Emre Demir','EM'],['Hakan Koç','HK'],['Ceyda Nur','CN'],['Kaan Tunç','KT'],['Naz Ak','NA']];
  const mk=(id,name,init,trs,lessons,months,used,so,eo)=>({id,name,initials:init,trainers:trs,
    pkg:{lessons,months,used,startISO:iso(addDays(now,so)),endISO:iso(addDays(now,eo))}});
  const roster=[
    mk('s1','Zeynep Kaya','ZK',['t1','t2'],12,3,4,-51,39),
    mk('p0','Mehmet Barış','MB',['t1'],10,2,6,-30,30),
    mk('p1','Ela Tan','ET',['t1','t2'],16,4,3,-20,100),
    mk('p2','Rüya Yıldız','RY',['t1'],8,1,2,-10,20),
    mk('p3','Deniz Kaya','DK',['t1'],5,1,1,-5,25),
    mk('p4','Levent Mor','LM',['t1'],10,3,7,-40,50),
    mk('p5','Emre Demir','EM',['t1'],8,1,8,-32,-2),
    mk('p6','Hakan Koç','HK',['t1'],12,3,5,-22,68),
    mk('p7','Ceyda Nur','CN',['t2'],4,1,1,-8,22),
    mk('p8','Kaan Tunç','KT',['t1','t2'],12,3,5,-15,75),
    mk('p9','Naz Ak','NA',['t1'],8,2,2,-12,48),
  ];
  const byName=n=>roster.find(r=>r.name===n);
  // Ahmet'in (t1) haftası — kim geliyor demosu
  const plan=[
    [0,10,'Mehmet Barış','approved'],[0,18,'Emre Demir','approved'],[0,19,'Kaan Tunç','approved'],[0,20,'Naz Ak','approved'],
    [1,10,'Zeynep Kaya','approved'],[1,18,'Emre Demir','approved'],[1,19,'Rüya Yıldız','pending'],[1,20,'Kaan Tunç','approved'],
    [2,12,'Deniz Kaya','approved'],[2,18,'Hakan Koç','approved'],[2,19,'Levent Mor','approved'],[2,20,'Ceyda Nur','approved'],
    [3,10,'Ela Tan','approved'],[3,18,'Hakan Koç','approved'],[3,20,'Mehmet Barış','approved'],
    [4,10,'Rüya Yıldız','approved'],[4,12,'Levent Mor','approved'],[4,18,'Deniz Kaya','approved'],[4,19,'Naz Ak','approved'],
    [5,10,'Deniz Kaya','approved'],[5,12,'Levent Mor','approved'],
  ];
  let rid=1; const requests=plan.map(p=>{ const s=byName(p[2]);
    return {id:'r'+(rid++),trainerId:'t1',studentId:s.id,studentName:s.name,initials:s.initials,dateISO:iso(addDays(monday,p[0])),hour:p[1],status:p[3]}; });
  const log=[
    {dateISO:iso(addDays(now,-2)),trainer:'Ahmet H.',kind:'done',delta:-1},
    {dateISO:iso(addDays(now,-6)),trainer:'Ceren H.',kind:'done',delta:-1},
    {dateISO:iso(addDays(now,-9)),trainer:'Ahmet H.',kind:'refund',delta:0},
    {dateISO:iso(addDays(now,-11)),trainer:'Ceren H.',kind:'burn',delta:-1},
  ];
  const notifs=[
    {icon:'✅',t:'Dersin onaylandı',d:'Ahmet Hoca · Salı 10:00',when:'2s önce'},
    {icon:'🕒',t:'Talebin alındı',d:'Ceren Hoca · onay bekliyor',when:'dün'},
  ];
  const report={month:MON[now.getMonth()]+' '+now.getFullYear(),
    perTrainer:[['Ahmet',96],['Ceren',78],['Deniz',64],['Mert',44],['Sıla',30]], given:312,cancel:27};
  return {v:2, role:'student', meId:'s1', screen:{student:'home',trainer:'agenda',admin:'reports'},
    agendaView:'day', dayOffset:(now.getDay()===0?6:now.getDay()-1),
    bookTrainer:'t1', bookDayOffset:0, bookHour:null,
    def:{memberId:'s1',trainers:['t1'],lessons:12,months:3},
    roster, requests, log, notifs, report, mondayISO:iso(monday)};
}
let S;
function load(){ try{ const r=localStorage.getItem(KEY); S=r?JSON.parse(r):seed(); if(S.v!==2) S=seed(); }catch(e){ S=seed(); } }
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(S)); }catch(e){} }
function resetDemo(){ if(confirm('Demo verileri sıfırlansın mı?')){ S=seed(); save(); render(); toast('Demo sıfırlandı'); } }
const me=()=>S.roster.find(r=>r.id===S.meId);
const member=id=>S.roster.find(r=>r.id===id);

/* ---------- iş mantığı ---------- */
function weekDates(){ const m=new Date(S.mondayISO); m.setHours(12,0,0,0); return Array.from({length:7},(_,i)=>addDays(m,i)); }
function activeReqs(tId,dISO){ return S.requests.filter(r=>r.trainerId===tId && r.dateISO===dISO && (r.status==='approved'||r.status==='pending')); }
function freeHours(tId,d){ const t=trainer(tId); if(!t.workDays.includes(d.getDay())) return []; const taken=activeReqs(tId,iso(d)).map(r=>r.hour); return t.hours.filter(h=>!taken.includes(h)); }
function pendingFor(tId){ return S.requests.filter(r=>r.trainerId===tId && r.status==='pending'); }
function studentsOf(tId){ return S.roster.filter(r=>r.trainers.includes(tId)); }

function book(){
  const sel=weekDates()[S.bookDayOffset]||weekDates()[0];
  const t=trainer(S.bookTrainer); const p=me().pkg;
  if(p.used>=p.lessons){ toast('Kotan dolu — talep açılamıyor'); return; }
  if(S.bookHour==null) return;
  S.requests.push({id:'r'+Date.now(),trainerId:S.bookTrainer,studentId:S.meId,studentName:me().name,initials:me().initials,dateISO:iso(sel),hour:S.bookHour,status:'pending'});
  S.notifs.unshift({icon:'🕒',t:'Talebin alındı',d:`${t.name} · ${DOW[sel.getDay()]} ${hh(S.bookHour)}`,when:'şimdi'});
  S.bookHour=null; save(); S.screen.student='home'; render(); toast('Talep gönderildi · dilim kilitlendi 🔒');
}
function approve(id){ const r=S.requests.find(x=>x.id===id); if(!r) return; r.status='approved';
  const s=member(r.studentId);
  if(s.id===S.meId){ s.pkg.used=Math.min(s.pkg.lessons,s.pkg.used+1);
    S.log.unshift({dateISO:r.dateISO,trainer:firstName(r.trainerId)+' H.',kind:'done',delta:-1});
    S.notifs.unshift({icon:'✅',t:'Dersin onaylandı',d:`${trainer(r.trainerId).name} · ${hh(r.hour)}`,when:'şimdi'}); }
  else { s.pkg.used=Math.min(s.pkg.lessons,s.pkg.used+1); }
  save(); render(); toast('Onaylandı ✅ kotadan düşüldü'); }
function reject(id){ const r=S.requests.find(x=>x.id===id); if(!r) return; r.status='rejected';
  if(r.studentId===S.meId) S.notifs.unshift({icon:'✕',t:'Talebin reddedildi',d:`${trainer(r.trainerId).name} · dilim tekrar açıldı`,when:'şimdi'});
  save(); render(); toast('Reddedildi · dilim açıldı'); }

function defToggleTrainer(id){ const a=S.def.trainers; const i=a.indexOf(id); if(i>=0){ if(a.length>1)a.splice(i,1); } else a.push(id); save(); render(); }
function defPickMember(id){ const m=member(id); S.def={memberId:id,trainers:[...m.trainers],lessons:m.pkg.lessons,months:m.pkg.months}; save(); render(); }
function defQuick(n){ S.def.lessons=n; save(); render(); }
function defineSubmit(){
  const m=member(S.def.memberId); const now=new Date(); now.setHours(12,0,0,0);
  const lessons=Math.max(1,parseInt(S.def.lessons)||1), months=Math.max(1,parseInt(S.def.months)||1);
  m.trainers=[...S.def.trainers];
  m.pkg={lessons,months,used:0,startISO:iso(now),endISO:iso(addDays(now,months*30))};
  save(); render(); toast(`${m.name} · ${lessons} ders / ${months} ay tanımlandı`);
}

/* ---------- render ---------- */
function render(){
  const titles={student:'Öğrenci',trainer:'Hoca',admin:'Salon Sahibi'};
  let h=`<div class="demobar"><div class="lbl"><span>Demo görünüm · rol değiştir</span><span class="reset" onclick="resetDemo()">↺ Sıfırla</span></div>
    <div class="seg">${['student','trainer','admin'].map(r=>`<button class="${S.role===r?'on':''}" onclick="setRole('${r}')">${titles[r]}</button>`).join('')}</div></div>`;
  h+=`<div class="content fadein">`+(S.role==='student'?renderStudent():S.role==='trainer'?renderTrainer():renderAdmin())+`</div>`;
  h+=renderTabs();
  $('app').innerHTML=h;
}
function setRole(r){ S.role=r; save(); render(); }
function go(s){ S.screen[S.role]=s; save(); render(); }

/* ===== ÖĞRENCİ ===== */
function renderStudent(){
  const sc=S.screen.student, p=me().pkg;
  if(sc==='book') return renderBook();
  if(sc==='package'){
    return `<div class="appbar"><button class="back" onclick="go('home')">‹ Geri</button><div class="avatar">${me().initials}</div></div>
    <div style="padding:0 3px"><div class="title">${p.lessons} Derslik Paket</div><div class="sub">${p.months} ay · ${fmtShort(p.startISO)} – ${fmtShort(p.endISO)}</div></div>
    <div class="stat2"><div class="stat"><div class="n" style="color:var(--ok)">${p.lessons-p.used}</div><div class="l">Kalan hak</div></div>
      <div class="stat"><div class="n">${daysLeft(p.endISO)}<span class="u"> gün</span></div><div class="l">Süre kaldı</div></div></div>
    <div class="sect">Kullanım dökümü</div>
    ${S.log.map(l=>{ const m={done:['ok','✓','Ders yapıldı'],refund:['blue','↩︎','İptal · zamanında iade'],burn:['stop','⚡','İptal · aynı gün']}[l.kind];
      const pv=l.delta<0?`<span class="pill stop">${l.delta}</span>`:`<span class="pill ok">+0</span>`;

  }

  // home
  const mine=S.requests.filter(r=>r.studentId===S.meId).sort((a,b)=>(a.dateISO+pad(a.hour))>(b.dateISO+pad(b.hour))?1:-1);
  const up=mine.filter(r=>r.status==='approved').slice(0,3);
  const pend=mine.filter(r=>r.status==='pending');
  return `<div class="appbar"><div><div class="title">Merhaba, ${me().name.split(' ')[0]}</div><div class="sub">Grand Fitness · Kadıköy</div></div><div class="avatar">${me().initials}</div></div>
  <div class="card hero"><div class="label">Aktif Paket</div>
    <div class="big">${p.lessons-p.used}<small> / ${p.lessons} ders kaldı</small></div>
    <div class="bar"><span style="width:${p.used/p.lessons*100}%"></span></div>
    <div class="meta"><span>${daysLeft(p.endISO)} gün kaldı</span><span>Bitiş ${fmtShort(p.endISO)}</span></div></div>
  <div class="sect">Hocaların</div>
  <div class="chips" style="padding:0 2px">${me().trainers.map(id=>`<span class="chip">${trainer(id).name}</span>`).join('')}</div>
  <div class="sect">Yaklaşan ders</div>
  ${up.length?up.map(r=>lessonRow(r,'ok','Onaylı')).join(''):`<div class="row"><div class="ic blue">📅</div><div class="grow"><div class="t">Planlı ders yok</div><div class="d">Aşağıdan ders alabilirsin</div></div></div>`}
  ${pend.length?`<div class="sect">Bekleyen talepler</div>`+pend.map(r=>lessonRow(r,'wait','Beklemede')).join(''):''}
  <button class="btn" onclick="go('book')" style="margin-top:8px">+ Ders Al</button>
  <button class="btn ghost sm" onclick="go('package')">Paket detayını gör</button>`;
}
function lessonRow(r,cls,label){ return `<div class="row"><div class="ic blue">🏋️</div><div class="grow"><div class="t">${firstName(r.trainerId)} Hoca</div><div class="d">${fmtShort(r.dateISO)} · ${hh(r.hour)}${cls==='wait'?' · dilim kilitli':''}</div></div><span class="pill ${cls}">${label}</span></div>`; }

function renderBook(){
  const week=weekDates(); const sel=week[S.bookDayOffset]||week[0];
  const trs=me().trainers; if(!trs.includes(S.bookTrainer)) S.bookTrainer=trs[0];
  const t=trainer(S.bookTrainer); const free=freeHours(S.bookTrainer,sel);
  return `<div class="appbar"><button class="back" onclick="go('home')">‹ Geri</button><div class="title" style="font-size:19px">Ders Al</div></div>
  <div class="sect">Hoca seç</div>
  <div class="btnrow">${trs.map(id=>`<button class="btn ${id===S.bookTrainer?'':'ghost'} sm" style="flex:1" onclick="setBookTrainer('${id}')">${trainer(id).name.split(' ')[0]}</button>`).join('')}</div>
  <div class="sect">Gün seç</div>
  <div class="days">${week.map((d,i)=>{ const has=freeHours(S.bookTrainer,d).length>0;
    return `<div class="day ${i===S.bookDayOffset?'on':''} ${has?'':'off'}" onclick="setBookDay(${i})">${DOW[d.getDay()]}<span class="n">${d.getDate()}</span></div>`; }).join('')}</div>
  <div class="sect">Boş saatler · ${fmtDay(sel)}</div>
  <div class="slots">${t.hours.map(hr=>{ const isFree=free.includes(hr); const on=S.bookHour===hr&&isFree;
    return `<div class="slot ${on?'sel':isFree?'free':'busy'}" ${isFree?`onclick="setBookHour(${hr})"`:''}>${hh(hr)}</div>`; }).join('')}</div>
  ${!free.length?`<div class="empty">Bu gün için boş saat yok — başka gün dene</div>`:''}
  ${S.bookHour!=null?`<div class="card"><div class="row" style="background:none;border:none;padding:0"><div class="ic blue">🔒</div><div class="grow"><div class="t">${DOW[sel.getDay()]} ${hh(S.bookHour)} seçildi</div><div class="d">Talep açılınca dilim kilitlenir · onayda kotadan 1 düşer</div></div></div></div>`:''}
  <button class="btn" onclick="book()" ${S.bookHour==null?'disabled':''}>Ders Talebi Gönder</button>`;
}
function setBookTrainer(id){ S.bookTrainer=id; S.bookHour=null; save(); render(); }
function setBookDay(i){ S.bookDayOffset=i; S.bookHour=null; save(); render(); }
function setBookHour(h){ S.bookHour=h; save(); render(); }

/* ===== HOCA (t1 = Ahmet) ===== */
function renderTrainer(){
  const sc=S.screen.trainer;
  if(sc==='avail') return renderAvail();
  if(sc==='students') return renderTrStudents();
  if(sc==='notifs'){ const pend=pendingFor('t1');
    return `<div class="appbar"><div><div class="title">Bildirimler</div><div class="sub">Ahmet Yılmaz</div></div><div class="avatar">AY</div></div>
    <div class="sect">Onay bekleyen</div>${pend.length?pend.map(pendCard).join(''):`<div class="empty">Bekleyen talep yok 🎉</div>`}`; }
  return renderAgenda();
}
function pendCard(r){ return `<div class="card"><div class="row" style="background:none;border:none;padding:0 0 12px"><div class="miniav wait">${r.initials}</div><div class="grow"><div class="t">${r.studentName}</div><div class="d">${DOW[new Date(r.dateISO).getDay()]} ${fmtShort(r.dateISO)} · ${hh(r.hour)} · onay bekliyor</div></div></div><div class="btnrow"><button class="b-ok" onclick="approve('${r.id}')">Onayla</button><button class="b-no" onclick="reject('${r.id}')">Reddet</button></div></div>`; }

function renderAgenda(){
  const week=weekDates(); const off=S.dayOffset, sel=week[off]; const pend=pendingFor('t1');
  const head=`<div class="appbar"><div><div class="title">${sameDay(sel,new Date())?'Bugün':DOW[sel.getDay()]}</div><div class="sub">${fmtDay(sel)} · ${activeReqs('t1',iso(sel)).length} ders</div></div><div class="avatar">AY</div></div>
  <div class="toggle"><button class="${S.agendaView==='day'?'on':''}" onclick="setAgenda('day')">Gün</button><button class="${S.agendaView==='week'?'on':''}" onclick="setAgenda('week')">Hafta</button></div>`;
  if(S.agendaView==='week'){
    const times=[10,12,18,19,20];
    return head+`<div class="card" style="padding:14px 10px">
      <div class="wgrid" style="margin-bottom:6px"><span class="h"></span>${week.map(d=>`<span class="h">${DOW[d.getDay()]}</span>`).join('')}</div>
      <div class="wgrid" style="row-gap:6px">${times.map(h=>`<span class="tlab">${h}</span>`+week.map(d=>{ const r=activeReqs('t1',iso(d)).find(x=>x.hour===h);
        if(!r) return `<span class="cell free"></span>`; return `<span class="cell ${r.status==='pending'?'wait':'ok'}">${r.initials}</span>`; }).join('')).join('')}</div></div>
    <div class="row"><div class="ic blue">👆</div><div class="grow"><div class="t">Bir güne dokun</div><div class="d">Günlük ajandaya iner · kim geliyor görünür</div></div></div>
    <div class="days">${week.map((d,i)=>`<div class="day ${i===off?'on':''}" onclick="setDay(${i})">${DOW[d.getDay()]}<span class="n">${d.getDate()}</span></div>`).join('')}</div>
    ${pend.length?`<div class="sect">Onay bekleyen (${pend.length})</div>`+pend.map(pendCard).join(''):''}`;
  }
  const t=trainer('t1');
  const rows=t.hours.map(h=>{ const r=activeReqs('t1',iso(sel)).find(x=>x.hour===h);
    if(!r) return `<div class="tlrow"><span class="time">${hh(h)}</span><div class="slotcard empty">Boş</div></div>`;
    const isNow=sameDay(sel,new Date())&&new Date().getHours()===h; const cls=r.status==='pending'?'wait':'ok';
    const badge=r.status==='pending'?`<span class="pill wait">Beklemede</span>`:`<span class="pill ok">Onaylı</span>`;
    return `<div class="tlrow"><span class="time">${hh(h)}</span><div class="slotcard"><span class="lead ${cls}"></span><span class="miniav ${cls==='wait'?'wait':''}">${r.initials}</span><div class="grow"><div class="t">${r.studentName}${isNow?' · sırada':''}</div><div class="d">${cls==='wait'?'Onay bekliyor':'Onaylı ders'}</div></div>${badge}</div></div>`; }).join('');
  return head+`<div class="days">${week.map((d,i)=>`<div class="day ${i===off?'on':''}" onclick="setDay(${i})">${DOW[d.getDay()]}<span class="n">${d.getDate()}</span></div>`).join('')}</div>
  ${pend.length?`<div class="sect">Onay bekleyen (${pend.length})</div>`+pend.map(pendCard).join(''):''}
  <div class="sect">Günün akışı</div><div class="tl">${rows}</div>`;
}
function sameDay(a,b){ return iso(a)===iso(b); }
function setAgenda(v){ S.agendaView=v; save(); render(); }
function setDay(i){ S.dayOffset=i; if(S.agendaView==='week') S.agendaView='day'; save(); render(); }

function renderAvail(){ const t=trainer('t1');
  return `<div class="appbar"><div><div class="title">Müsaitliğim</div><div class="sub">Haftalık plan · saatlik</div></div><div class="avatar">AY</div></div>
  <div class="card"><div class="sect" style="margin:0 0 10px">Çalışılan günler</div>
    <div class="days">${[1,2,3,4,5,6,0].map(d=>`<div class="day ${t.workDays.includes(d)?'on':'off'}">${DOW[d]}</div>`).join('')}</div>
    <div class="row" style="margin-top:12px;background:none;border:none;padding:2px"><div class="ic blue">⏰</div><div class="grow"><div class="t">${hh(t.hours[0])} – ${hh(t.hours[t.hours.length-1]+1)}</div><div class="d">Saatlik dilimlere otomatik bölünür</div></div></div></div>
  <div class="row"><div class="ic ok">📌</div><div class="grow"><div class="t">Prototip notu</div><div class="d">Gün/saat düzenleme ekranı sonraki adımda</div></div></div>`;
}
function renderTrStudents(){ const list=studentsOf('t1');
  return `<div class="appbar"><div><div class="title">Öğrencilerim</div><div class="sub">Sana tanımlı ${list.length} öğrenci</div></div><div class="avatar">AY</div></div>
  <div class="row" style="background:var(--surface-3)"><div class="ic blue">🔒</div><div class="grow"><div class="t">Yalnızca sana tanımlı üyeler</div><div class="d">Diğer hocaların öğrencileri burada görünmez</div></div></div>
  ${list.map(s=>{ const p=s.pkg; return `<div class="row"><div class="miniav">${s.initials}</div><div class="grow"><div class="t">${s.name}</div><div class="d">${p.lessons-p.used}/${p.lessons} ders · ${daysLeft(p.endISO)} gün</div></div><span class="pill ${p.used>=p.lessons?'stop':'ok'}">${p.used>=p.lessons?'Doldu':'Aktif'}</span></div>`; }).join('')}`;
}

/* ===== YÖNETİCİ ===== */
function renderAdmin(){
  const sc=S.screen.admin;
  if(sc==='members') return renderMembers();
  if(sc==='panel'){ const r=S.report;
    return `<div class="appbar"><div><div class="title">Grand Fitness</div><div class="sub">Yönetim · ${S.roster.length} üye · ${TRAINERS.length} hoca</div></div><div class="avatar">GF</div></div>
    <div class="stat2"><div class="stat"><div class="n">${S.roster.length}</div><div class="l">Aktif öğrenci</div></div><div class="stat"><div class="n">${TRAINERS.length}</div><div class="l">Hoca</div></div></div>
    <div class="stat2"><div class="stat"><div class="n">${r.given}</div><div class="l">Bu ay ders</div></div><div class="stat"><div class="n" style="color:var(--stop)">${r.cancel}</div><div class="l">İptal</div></div></div>
    <button class="btn" onclick="go('reports')">Raporları aç</button>
    <button class="btn ghost sm" onclick="go('members')">Üye & paket yönetimi</button>`;
  }
  return renderReports();
}
function renderReports(){
  const r=S.report, max=Math.max(...r.perTrainer.map(x=>x[1]));
  const counts={}; S.requests.filter(x=>x.status==='approved'||x.status==='pending').forEach(x=>counts[x.hour]=(counts[x.hour]||0)+1);
  const hoursSorted=Object.entries(counts).map(([h,c])=>[+h,c]).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const hmax=Math.max(1,...hoursSorted.map(x=>x[1]));
  return `<div class="appbar"><div><div class="title">Raporlar</div><div class="sub">${r.month} · bu ay</div></div><div class="avatar">GF</div></div>
  <div class="stat2"><div class="stat"><div class="n">${r.given}</div><div class="l">Verilen ders</div><div class="tr up">▲ %14 · geçen ay</div></div>
    <div class="stat"><div class="n">${r.cancel}</div><div class="l">İptal</div><div class="tr down">▲ %6 · geçen ay</div></div></div>
  <div class="card"><div class="sect" style="margin:0 0 4px">Hoca başına ders · bu ay</div>
    <div class="chart">${r.perTrainer.map((x,i)=>`<div class="barcol"><span class="val">${x[1]}</span><span class="stick ${i>2?'dim':''}" style="height:${x[1]/max*100}%"></span><span class="lab">${x[0]}</span></div>`).join('')}</div></div>
  <div class="card"><div class="sect" style="margin:0 0 12px">En yoğun saatler</div>
    ${hoursSorted.map(x=>`<div class="lgrow" style="margin-bottom:12px"><span class="sw" style="background:var(--accent)"></span><div class="grow"><div class="rowspace"><span>${hh(x[0])}</span><span>${x[1]} ders</span></div><div class="track"><span style="width:${x[1]/hmax*100}%;background:var(--grad)"></span></div></div></div>`).join('')}</div>`;
}

        <span class="pill ${ended?'stop':'ok'}">${ended?'Bitti':'Aktif'}</span></div>
      <div class="chips">${s.trainers.map(id=>`<span class="chip">👤 ${trainer(id).name.split(' ')[0]}</span>`).join('')}</div>

/* ===== TAB BAR ===== */
function renderTabs(){
  const pend=pendingFor('t1').length;
  const defs={ student:[['home','🏠','Ana'],['book','📅','Ders Al'],['package','🎟️','Paket'],['notifs','🔔','Bildirim']],
    trainer:[['agenda','📅','Takvim'],['avail','➕','Müsaitlik'],['students','👥','Öğrenci'],['notifs','🔔','Bildirim']],
    admin:[['reports','📈','Rapor'],['members','👥','Üye'],['panel','📊','Panel']] }[S.role];
  const cur=S.screen[S.role];
  return `<div class="tabbar">${defs.map(x=>{ const on=cur===x[0];
    const badge=(S.role==='trainer'&&(x[0]==='notifs'||x[0]==='agenda')&&pend)?`<span class="badge">${pend}</span>`:'';
    return `<button class="tb ${on?'on':''}" onclick="go('${x[0]}')"><span class="g">${x[1]}</span>${x[2]}${badge}</button>`; }).join('')}</div>`;
}
function notifScreen(av){
